<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가계부</title>
<style>
  :root{
    --bg:#f6f5f1;
    --ink:#22221f;
    --sub:#6b6a63;
    --line:#e1dfd6;
    --card:#ffffff;
    --accent:#3a5a52;

    --income-bg:#e2eef5; --income-ink:#1f5c82;
    --expense-bg:#fdf3d9; --expense-ink:#8a6d16;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    background:var(--bg);
    color:var(--ink);
    padding:32px 24px 80px;
  }

  .wrap{ max-width: 1600px; width: 95%; margin:0 auto; }

  header{margin-bottom:20px;}
  .home-btn{
    display:inline-block;
    font-size:12.5px;
    color:var(--sub);
    text-decoration:none;
    margin-bottom:8px;
  }
  .home-btn:hover{color:var(--accent);}
  h1{font-size:26px;letter-spacing:-0.02em;margin:0 0 4px;}
  header p{margin:0;color:var(--sub);font-size:13.5px;}

  .panel{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
  }
  
  /* 캘린더 상단 헤더 & 범례 */
  .cal-header-wrap {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .cal-header-wrap h2 {
    font-size: 17px;
    margin: 0 !important;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .cal-header-wrap h2::before {
    content: "";
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent);
    display: inline-block;
  }
  .cal-legend {
    display: flex;
    align-items: center;
    gap: 14px;
    font-size: 13px;
    color: var(--sub);
    flex-wrap: wrap;
  }
  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 500;
  }
  .color-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }

  /* 캘린더 그리드 */
  .ledger-cal-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 6px;
  }
  .cal-dow {
    text-align: center;
    font-size: 13px;
    color: var(--sub);
    font-weight: 600;
    padding-bottom: 12px;
  }
  .cal-cell {
    min-height: 100px;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 6px;
    background: #fdfcfa;
    display: flex;
    flex-direction: column;
    gap: 4px;
    overflow: hidden;
  }
  .cal-cell.other-month {
    background: transparent;
    border-color: transparent;
  }
  .cal-cell.today {
    border-color: var(--accent);
    background: #f4f8f6;
  }
  .cal-daynum {
    font-size: 11.5px;
    color: var(--sub);
    margin-bottom: 2px;
  }
  .cal-cell.today .cal-daynum {
    color: var(--accent);
    font-weight: 700;
  }
  
  /* 캘린더 칩 스타일 */
  .cal-item {
    font-size: 11px;
    padding: 3px 6px;
    border-radius: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 4px;
    cursor: pointer;
    transition: transform 0.1s ease;
  }
  .cal-item:hover {
    transform: translateY(-1px);
    filter: brightness(0.95);
  }
  .cal-item .detail { overflow: hidden; text-overflow: ellipsis; }
  .cal-item .amt { font-weight: 700; flex-shrink: 0; }
  .cal-item .unit { display: inline; }

  /* 월 선택 컨트롤 (맨 위 위치) */
  .month-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 20px;
  }
  .month-controls {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 12px;
  }
  .month-controls button {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 50%;
    width: 42px;
    height: 42px;
    font-size: 16px;
    color: var(--sub);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }
  .month-controls button:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .current-month {
    font-size: 26px;
    font-weight: 700;
    min-width: 90px;
    text-align: center;
    color: var(--ink);
  }
  .month-mini-summary {
    font-size: 14px;
    color: var(--sub);
    background: var(--bg);
    padding: 8px 20px;
    border-radius: 20px;
    display: inline-flex;
    align-items: center;
  }
  .month-mini-summary .income-text { color: #007BFF; font-weight: 700; }
  .month-mini-summary .expense-text { color: var(--expense-ink); font-weight: 700; }
  .month-mini-summary .divider { margin: 0 12px; color: #d1cfc4; }

  /* 📊 항목별 요약 카드 (요청 순서: 공동, 관, 보라, 유류비, 고정지출, 기타) */
  .summary {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 12px;
    margin-bottom: 22px;
  }
  .sum-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px 14px;
    position: relative;
    overflow: hidden;
  }
  .sum-card::before {
    content: "";
    position: absolute;
    top: 0; left: 0; bottom: 0;
    width: 5px;
  }
  .sum-card.type-joint::before { background: #343A40; }
  .sum-card.type-gwan::before { background: #28A745; }
  .sum-card.type-bora::before { background: #E83E8C; }
  .sum-card.type-fuel::before { background: #FD7E14; }
  .sum-card.type-fixed::before { background: #6C757D; }
  .sum-card.type-etc::before { background: #6f42c1; }

  .sum-card .lbl { font-size: 12.5px; color: var(--sub); margin-bottom: 6px; font-weight: 600; }
  .sum-card .num {
    font-size: 18px;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    color: var(--ink);
  }

  /* 연간 한눈에 보기 */
  .yearly-panel h2 { font-size:16px; }
  .yearly-toggle-header {
    cursor: pointer;
    user-select: none;
    margin: 0 !important;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .yearly-toggle-header .arrow {
    font-size: 13px;
    color: var(--sub);
    transition: transform 0.2s;
  }
  .yearly-panel.open .yearly-toggle-header .arrow {
    transform: rotate(180deg);
  }
  .yearly-content-wrap {
    display: none;
    margin-top: 16px;
  }
  .yearly-panel.open .yearly-content-wrap {
    display: block;
  }

  .yearly-pc { display: block; }
  .yearly-mobile { display: none; }

  .yearly-scroll{overflow-x:auto;border-radius:8px;}
  .yearly-scroll + .yearly-scroll{margin-top:16px;}
  table.yearly-table{width:100%;border-collapse:collapse;font-size:12.5px;white-space:nowrap;}
  .yearly-table th{
    padding:8px 10px;
    text-align:right;
    font-weight:600;
    color:var(--sub);
    background:var(--bg);
    border-bottom:1px solid var(--line);
  }
  .yearly-table th.label{text-align:left;color:var(--ink);}
  .yearly-table td{
    padding:7px 10px;
    text-align:right;
    border-bottom:1px solid #eee;
  }
  .yearly-table td.label{text-align:left;color:var(--sub);}
  .yearly-table tr.balance-row td, .yearly-table tr.balance-row th{background:#e3ede4;}
  .yearly-table tr.balance-row td.label{color:#2f6b3c;font-weight:600;}
  .yearly-table tr.total-row td{background:var(--expense-bg);font-weight:700;color:var(--expense-ink);}
  .yearly-table tr.total-row td.label{color:var(--expense-ink);}
  .yearly-table tr.sub-total-row td{background:#fbeceb;font-weight:600;}
  .yearly-table tr.sub-total-row td.label{color:#9a4a44;}
  .yearly-table tr.detail-row td{background:#fff;color:var(--ink);}
  .yearly-table tr.detail-row:hover td{background:#fafaf7;}
  .yearly-loading{padding:20px 0;text-align:center;color:var(--sub);font-size:13px;}

  /* 📱 모바일 상세 토스트 팝업 */
  .mobile-toast {
    position: fixed;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: #212529;
    color: #fff;
    padding: 12px 20px;
    border-radius: 24px;
    font-size: 13px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.25);
    z-index: 9999;
    opacity: 0;
    transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
    pointer-events: none;
    max-width: 90%;
    text-align: center;
  }
  .mobile-toast.show {
    transform: translateX(-50%) translateY(0);
    opacity: 1;
  }

  /* 📱 모바일 반응형 최적화 */
  @media (max-width: 900px) {
    body { padding: 16px 10px 40px; overflow-x: hidden; }
    .wrap { max-width: 100%; width: 100%; }
    
    .ledger-cal-grid { gap: 3px; }
    .cal-cell { min-height: 60px; padding: 2px; border-radius: 6px; }
    
    .cal-item .unit, .sum-card .unit { display: none !important; }

    .cal-item { 
      font-size: 9.5px; 
      padding: 2px 3px; 
      border-radius: 3px;
      justify-content: center;
    }
    .cal-item .detail { display: none; }
    .cal-item .amt { font-weight: 700; text-align: center; }

    .cal-legend { font-size: 11.5px; gap: 8px; }
    .color-dot { width: 8px; height: 8px; }

    .summary {
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
    }
    .sum-card { padding: 10px 8px; }
    .sum-card .lbl { font-size: 11px; margin-bottom: 2px; }
    .sum-card .num {
      font-size: 14px !important;
      white-space: nowrap !important;
      letter-spacing: -0.03em;
    }

    .yearly-pc { display: none !important; }
    .yearly-mobile { display: block !important; }

    .m-yearly-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }
    .m-y-card {
      background: var(--bg);
      border-radius: 8px;
      padding: 10px 12px;
      border: 1px solid var(--line);
    }
    .m-y-card .lbl { font-size: 11px; color: var(--sub); }
    .m-y-card .val {
      font-size: 14px;
      font-weight: 700;
      margin-top: 2px;
      white-space: nowrap;
      letter-spacing: -0.03em;
    }
    .m-y-card.balance .val { color: #2f6b3c; }
    .m-y-card.rate .val { color: #007BFF; }

    .m-month-chips {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 12px;
      -webkit-overflow-scrolling: touch;
    }
    .m-chip {
      flex: 0 0 auto;
      padding: 6px 12px;
      border-radius: 16px;
      background: var(--bg);
      border: 1px solid var(--line);
      font-size: 12px;
      color: var(--sub);
      cursor: pointer;
    }
    .m-chip.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 700;
    }

    .m-accordion-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 6px;
      overflow: hidden;
      background: #fff;
    }
    .m-accordion-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: #fafaf7;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    .m-accordion-header .amt { color: var(--expense-ink); white-space: nowrap; }
    .m-accordion-body {
      display: none;
      padding: 8px 12px;
      border-top: 1px dashed var(--line);
      font-size: 12px;
    }
    .m-accordion-item.open .m-accordion-body { display: block; }
    .m-detail-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      color: var(--sub);
    }
    .m-detail-row .name { color: var(--ink); }

    .month-header { padding: 16px 12px; }
    .current-month { font-size: 22px; }
    .month-mini-summary { font-size: 12px; padding: 6px 14px; white-space: nowrap; }
  }
</style>
</head>
<body>
<div class="wrap" id="appContent">

  <header>
    <a href="./index.html" class="home-btn">← 홈</a>
    <h1>가계부</h1>
    <p>달력으로 지출 현황을 확인하고 연간 통계를 확인합니다.</p>
  </header>

  <!-- 1. 월 선택 및 미니 요약 컨트롤 (맨 위) -->
  <div class="month-header">
    <div class="month-controls">
      <button onclick="changeMonth(-1)">❮</button>
      <div class="current-month" id="monthDisplay">7월</div>
      <button onclick="changeMonth(1)">❯</button>
    </div>
    <div class="month-mini-summary">
      <span class="income-text">수입 <span id="miniIncome">0</span>원</span>
      <span class="divider">|</span>
      <span class="expense-text">지출 <span id="miniExpense">0</span>원</span>
    </div>
  </div>

  <!-- 2. 캘린더 영역 -->
  <div class="panel">
    <div class="cal-header-wrap">
      <h2 id="calTitleHeader">7월 캘린더</h2>
      
      <!-- 🎨 범례 디자인 (요청 순서: 공동, 관, 보라, 유류비, 고정지출, 기타) -->
      <div class="cal-legend">
        <span class="legend-item"><span class="color-dot" style="background:#343A40;"></span>공동</span>
        <span class="legend-item"><span class="color-dot" style="background:#28A745;"></span>관</span>
        <span class="legend-item"><span class="color-dot" style="background:#E83E8C;"></span>보라</span>
        <span class="legend-item"><span class="color-dot" style="background:#FD7E14;"></span>유류비</span>
        <span class="legend-item"><span class="color-dot" style="background:#6C757D;"></span>고정지출</span>
        <span class="legend-item"><span class="color-dot" style="background:#6f42c1;"></span>기타</span>
        <span class="legend-item"><span class="color-dot" style="background:#007BFF;"></span>수입</span>
      </div>
    </div>
    
    <div class="ledger-cal-grid" id="ledgerCalGrid"></div>
  </div>

  <!-- 3. 항목별 토탈 금액 카드 (요청 순서: 공동, 관, 보라, 유류비, 고정지출, 기타) -->
  <div class="summary" id="summary"></div>

  <!-- 4. 연간 한눈에 보기 -->
  <div class="panel yearly-panel" id="yearlyPanel">
    <h2 class="yearly-toggle-header" onclick="toggleYearlyPanel()">
      <span>연간 한눈에 보기</span>
      <span class="arrow">▼</span>
    </h2>
    <div class="yearly-content-wrap">
      <div id="yearlySummary">
        <div class="yearly-loading">연간 데이터를 계산 중입니다...</div>
      </div>
    </div>
  </div>

</div>

<div id="mobileToast" class="mobile-toast"></div>

<!-- Supabase 클라이언트 SDK 연동 -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="./supabase-config.js"></script>

<script>
const sb = supabase.createClient(window.SUPABASE_URL, window.SUPABASE_ANON_KEY);

let allYearData = new Array(12).fill(null).map(() => []); 
let currentMonth = new Date().getMonth() + 1;
let currentYear = new Date().getFullYear();
let selectedMobileMonth = 0;
let toastTimer = null;

function escapeHtml(str){
  return (str||"").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function formatMoney(n){
  return (Number(n)||0).toLocaleString('ko-KR');
}

function showToast(text) {
  const toast = document.getElementById('mobileToast');
  toast.textContent = text;
  toast.classList.add('show');
  
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => {
    toast.classList.remove('show');
  }, 2200);
}

function updateMonthDisplay(){
  document.getElementById('monthDisplay').textContent = currentMonth + "월";
  document.getElementById('calTitleHeader').textContent = currentMonth + "월 캘린더";
}

function changeMonth(offset){
  let newMonth = currentMonth + offset;
  if(newMonth < 1) newMonth = 12;
  if(newMonth > 12) newMonth = 1;
  currentMonth = newMonth;
  
  updateMonthDisplay();
  renderCurrentMonth();
}

function toggleYearlyPanel() {
  const panel = document.getElementById('yearlyPanel');
  panel.classList.toggle('open');
}

/* 🌟 정확한 소분류(G열) & 사용자(K열) 기준 분류 로직 */
function getCategoryGroup(item) {
  const typeStr = String(item.type || "").trim();      // D열 (지출/수입/고정지출/변동지출)
  const smallStr = String(item.small || "").trim();    // G열 (소분류)
  const detailStr = String(item.detail || "").trim();  // H열 (세부내용)
  const ownerStr = String(item.note || "").trim();     // K열 (사용자: 공동/보라/자동차/관)

  if (typeStr === "수입") {
    return "수입";
  }

  // 1. 유류비: 소분류가 전기충전/주유비 이거나 K열 사용자가 '자동차'인 경우
  if (
    smallStr === "전기충전" || smallStr === "주유비" ||
    ownerStr === "자동차" || detailStr.includes("차지비") || detailStr.includes("주유")
  ) {
    return "유류비";
  }

  // 2. 고정지출: (유류비 제외한 나머지 고정지출)
  if (typeStr === "고정지출") {
    return "고정지출";
  }

  // 3. 변동지출 소분류 및 사용자 기준 판단
  if (smallStr === "건강" || smallStr === "경조사") {
    return "기타";
  }

  if (smallStr.startsWith("관") || ownerStr === "관") {
    return "관"; // 관 기타, 관 생활비, 관 병원비
  }

  if (smallStr.startsWith("보라") || smallStr === "보라네" || ownerStr === "보라") {
    return "보라"; // 보라 기타, 보라 생활비, 보라 병원비, 보라네
  }

  // 4. 공동 + 기타 데이터 규칙 미반영 항목 ➔ 무조건 '공동'으로 귀속
  return "공동";
}

/* Supabase DB에서 1년 전체 데이터 로드 */
async function initFullYearDataFromSupabase(){
  try {
    const { data, error } = await sb
      .from('ledger_entries')
      .select('*');

    if (error) throw error;

    const monthMapped = new Array(12).fill(null).map(() => []);
    if (Array.isArray(data)) {
      data.forEach(item => {
        const mIdx = item.month - 1;
        if (mIdx >= 0 && mIdx < 12) {
          item.amount = Number(item.amount) || 0;
          monthMapped[mIdx].push(item);
        }
      });
    }

    allYearData = monthMapped;
    renderCurrentMonth();
    renderYearlySummary();
  } catch(e) {
    console.error("Supabase 데이터 로드 실패:", e);
  }
}

function renderCurrentMonth(){
  const entries = allYearData[currentMonth - 1] || [];
  renderSummary(entries);
  renderCalendar(entries);
}

/* 📊 6가지 항목별 토탈 계산 */
function renderSummary(entries){
  const totals = {
    "공동": 0,
    "관": 0,
    "보라": 0,
    "유류비": 0,
    "고정지출": 0,
    "기타": 0
  };
  
  let totalIncome = 0;
  let totalExpense = 0;

  entries.forEach(it => {
    const amt = Number(it.amount) || 0;
    const cat = getCategoryGroup(it);

    if (cat === "수입") {
      totalIncome += amt;
    } else {
      totalExpense += amt;
      if (totals[cat] !== undefined) {
        totals[cat] += amt;
      } else {
        totals["공동"] += amt; 
      }
    }
  });

  document.getElementById('summary').innerHTML = `
    <div class="sum-card type-joint">
      <div class="lbl">공동</div>
      <div class="num">${formatMoney(totals["공동"])}<span class="unit">원</span></div>
    </div>
    <div class="sum-card type-gwan">
      <div class="lbl">관</div>
      <div class="num">${formatMoney(totals["관"])}<span class="unit">원</span></div>
    </div>
    <div class="sum-card type-bora">
      <div class="lbl">보라</div>
      <div class="num">${formatMoney(totals["보라"])}<span class="unit">원</span></div>
    </div>
    <div class="sum-card type-fuel">
      <div class="lbl">유류비</div>
      <div class="num">${formatMoney(totals["유류비"])}<span class="unit">원</span></div>
    </div>
    <div class="sum-card type-fixed">
      <div class="lbl">고정지출</div>
      <div class="num">${formatMoney(totals["고정지출"])}<span class="unit">원</span></div>
    </div>
    <div class="sum-card type-etc">
      <div class="lbl">기타</div>
      <div class="num">${formatMoney(totals["기타"])}<span class="unit">원</span></div>
    </div>
  `;

  document.getElementById('miniIncome').textContent = formatMoney(totalIncome);
  document.getElementById('miniExpense').textContent = formatMoney(totalExpense);
}

/* 캘린더 렌더링 */
function renderCalendar(entries){
  const y = currentYear;
  const m = currentMonth - 1; 

  const byDate = {};
  entries.forEach(it => {
    if(!it.date) return;
    let dayKey = String(it.date).trim();
    if(dayKey.includes('T')) dayKey = dayKey.split('T')[0];
    
    const parts = dayKey.split('-');
    if(parts.length === 3){
      const dayNum = parseInt(parts[2], 10);
      (byDate[dayNum] = byDate[dayNum] || []).push(it);
    }
  });

  const first = new Date(y, m, 1);
  const startOffset = first.getDay(); 
  const daysInMonth = new Date(y, m + 1, 0).getDate();
  const daysInPrevMonth = new Date(y, m, 0).getDate();

  const today = new Date();
  const isCurrentMonthToday = (today.getFullYear() === y && today.getMonth() === m);
  const todayNum = today.getDate();

  const cells = [];
  const dowLabels = ['일','월','화','수','목','금','토'];
  dowLabels.forEach(l => cells.push(`<div class="cal-dow">${l}</div>`));

  for(let i = startOffset - 1; i >= 0; i--){
    cells.push(`<div class="cal-cell other-month"><div class="cal-daynum">${daysInPrevMonth - i}</div></div>`);
  }

  const categoryRank = {
    "수입": 0,
    "공동": 1,
    "관": 2,
    "보라": 3,
    "유류비": 4,
    "고정지출": 5,
    "기타": 6
  };

  for(let d = 1; d <= daysInMonth; d++){
    const isToday = isCurrentMonthToday && (d === todayNum);
    const dayEntries = byDate[d] || [];

    dayEntries.sort((a, b) => {
      const catA = getCategoryGroup(a);
      const catB = getCategoryGroup(b);

      const rankA = categoryRank[catA] !== undefined ? categoryRank[catA] : 99;
      const rankB = categoryRank[catB] !== undefined ? categoryRank[catB] : 99;

      return rankA - rankB;
    });

    const itemsHtml = dayEntries.map(it => {
      const cat = getCategoryGroup(it);
      const detailStr = escapeHtml(it.detail || it.small || it.large || "기타");
      const amt = Number(it.amount) || 0;

      let bgColor = "#343A40"; 
      let textColor = "#FFFFFF";
      let borderStyle = "none";

      switch (cat) {
        case "수입":
          bgColor = "#007BFF";
          break;
        case "공동":
          bgColor = "#343A40";
          break;
        case "관":
          bgColor = "#28A745";
          break;
        case "보라":
          bgColor = "#E83E8C";
          break;
        case "유류비":
          bgColor = "#FD7E14"; // 🧡 주황색
          break;
        case "고정지출":
          bgColor = "#6C757D";
          break;
        case "기타":
          bgColor = "#6f42c1";
          break;
        default:
          bgColor = "#343A40";
          break;
      }

      const toastText = `[${cat}] ${detailStr} : ${formatMoney(amt)}원`;

      return `
        <div class="cal-item" 
             style="background-color: ${bgColor} !important; color: ${textColor} !important; border: ${borderStyle};" 
             title="${toastText}"
             onclick="showToast('${toastText}')">
          <span class="detail">${detailStr}</span>
          <span class="amt">${formatMoney(amt)}<span class="unit">원</span></span>
        </div>
      `;
    }).join('');

    cells.push(`
      <div class="cal-cell ${isToday ? 'today' : ''}">
        <div class="cal-daynum">${d}</div>
        ${itemsHtml}
      </div>
    `);
  }

  const totalSoFar = startOffset + daysInMonth;
  const trailing = (7 - (totalSoFar % 7)) % 7;
  for(let d = 1; d <= trailing; d++){
    cells.push(`<div class="cal-cell other-month"><div class="cal-daynum">${d}</div></div>`);
  }

  document.getElementById('ledgerCalGrid').innerHTML = cells.join('');
}

function renderYearlySummary(){
  try {
    const N = 12;
    const incomeByMonth = new Array(N).fill(0);
    const tree = {};       
    const largeTotal = {}; 

    allYearData.forEach((entries, idx) => {
      entries.forEach(it => {
        const amt = Number(it.amount) || 0;
        const typeStr = String(it.type || "").trim();

        if(typeStr === "수입"){
          incomeByMonth[idx] += amt;
        } else {
          const large = it.large || "기타";
          const mid = it.mid || "기타";
          const small = it.small || "기타";

          if(!tree[large]) tree[large] = {};
          if(!tree[large][mid]) tree[large][mid] = {};
          if(!tree[large][mid][small]) tree[large][mid][small] = new Array(N).fill(0);
          tree[large][mid][small][idx] += amt;

          if(!largeTotal[large]) largeTotal[large] = new Array(N).fill(0);
          largeTotal[large][idx] += amt;
        }
      });
    });

    const totalExpenseByMonth = new Array(N).fill(0);
    Object.values(largeTotal).forEach(arr => arr.forEach((v, i) => totalExpenseByMonth[i] += v));

    const balanceByMonth = incomeByMonth.map((inc, i) => inc - totalExpenseByMonth[i]);
    const savingRateByMonth = incomeByMonth.map((inc, i) => inc > 0 ? (balanceByMonth[i] / inc * 100) : null);
    const sum = arr => arr.reduce((a, b) => a + b, 0);

    const monthHeaders = Array.from({length:N}, (_, i) => `<th>${i+1}월</th>`).join('');

    const pcTable1 = `
      <table class="yearly-table">
        <thead>
          <tr><th class="label" colspan="2">수입 - 지출</th>${monthHeaders}<th>연간 Balance</th></tr>
        </thead>
        <tbody>
          <tr class="balance-row">
            <td class="label" colspan="2">금액</td>
            ${balanceByMonth.map(v => `<td>${formatMoney(v)}</td>`).join('')}
            <td>${formatMoney(sum(balanceByMonth))}</td>
          </tr>
          <tr class="balance-row">
            <td class="label" colspan="2">저축율</td>
            ${savingRateByMonth.map(v => `<td>${v===null ? '-' : v.toFixed(2)+'%'}</td>`).join('')}
            <td></td>
          </tr>
        </tbody>
      </table>
    `;

    const order = { "고정지출":0, "변동지출":1 };
    const largeOrder = Object.keys(largeTotal).sort((a, b) => {
      const ao = order[a] !== undefined ? order[a] : 2;
      const bo = order[b] !== undefined ? order[b] : 2;
      return ao !== bo ? ao - bo : a.localeCompare(b, 'ko');
    });

    let pcRows = `<tr class="total-row"><td class="label" colspan="3">지출 합계</td>${totalExpenseByMonth.map(v => `<td>${formatMoney(v)}</td>`).join('')}<td>${formatMoney(sum(totalExpenseByMonth))}</td></tr>`;

    largeOrder.forEach(large => {
      pcRows += `<tr class="sub-total-row"><td class="label" colspan="3">${escapeHtml(large)}</td>${largeTotal[large].map(v => `<td>${formatMoney(v)}</td>`).join('')}<td>${formatMoney(sum(largeTotal[large]))}</td></tr>`;
    });

    largeOrder.forEach(large => {
      const mids = tree[large] || {};
      Object.keys(mids).forEach(mid => {
        const smalls = mids[mid];
        Object.keys(smalls).forEach(small => {
          const arr = smalls[small];
          pcRows += `<tr class="detail-row">
            <td class="label">${escapeHtml(large)}</td>
            <td class="label">${escapeHtml(mid)}</td>
            <td class="label">${escapeHtml(small)}</td>
            ${arr.map(v => `<td>${formatMoney(v)}</td>`).join('')}
            <td>${formatMoney(sum(arr))}</td>
          </tr>`;
        });
      });
    });

    const pcTable2 = `
      <table class="yearly-table">
        <thead>
          <tr><th class="label">대분류</th><th class="label">중분류</th><th class="label">소분류</th>${monthHeaders}<th>합계</th></tr>
        </thead>
        <tbody>${pcRows}</tbody>
      </table>
    `;

    const totalIncome = sum(incomeByMonth);
    const totalExpense = sum(totalExpenseByMonth);
    const totalBalance = sum(balanceByMonth);
    const validRates = savingRateByMonth.filter(r => r !== null);
    const avgRate = validRates.length > 0 ? (validRates.reduce((a,b)=>a+b,0) / validRates.length).toFixed(1) : '-';

    const mobileSummaryCards = `
      <div class="m-yearly-cards">
        <div class="m-y-card"><div class="lbl">연간 총수입</div><div class="val">${formatMoney(totalIncome)}원</div></div>
        <div class="m-y-card"><div class="lbl">연간 총지출</div><div class="val">${formatMoney(totalExpense)}원</div></div>
        <div class="m-y-card balance"><div class="lbl">연간 순수익(Balance)</div><div class="val">${formatMoney(totalBalance)}원</div></div>
        <div class="m-y-card rate"><div class="lbl">평균 저축률</div><div class="val">${avgRate}%</div></div>
      </div>
    `;

    let mobileChips = `<div class="m-month-chips">`;
    mobileChips += `<button class="m-chip ${selectedMobileMonth===0?'active':''}" onclick="selectMobileMonth(0)">연간 합계</button>`;
    for(let m=1; m<=12; m++){
      mobileChips += `<button class="m-chip ${selectedMobileMonth===m?'active':''}" onclick="selectMobileMonth(${m})">${m}월</button>`;
    }
    mobileChips += `</div>`;

    const mobileAccordion = buildMobileAccordion(tree, largeTotal, selectedMobileMonth);

    document.getElementById('yearlySummary').innerHTML = `
      <div class="yearly-pc">
        <div class="yearly-scroll">${pcTable1}</div>
        <div class="yearly-scroll">${pcTable2}</div>
      </div>
      <div class="yearly-mobile">
        ${mobileSummaryCards}
        ${mobileChips}
        <div id="mobileAccordionContainer">${mobileAccordion}</div>
      </div>
    `;
  } catch(err) {
    console.error("연간 렌더링 오류:", err);
  }
}

function selectMobileMonth(m){
  selectedMobileMonth = m;
  const chips = document.querySelectorAll('.m-chip');
  chips.forEach((c, idx) => {
    if(idx === m) c.classList.add('active');
    else c.classList.remove('active');
  });

  const N = 12;
  const tree = {};
  const largeTotal = {};
  allYearData.forEach((entries, idx) => {
    entries.forEach(it => {
      const typeStr = String(it.type || "").trim();
      if(typeStr !== "수입"){
        const amt = Number(it.amount) || 0;
        const large = it.large || "기타";
        const mid = it.mid || "기타";
        const small = it.small || "기타";

        if(!tree[large]) tree[large] = {};
        if(!tree[large][mid]) tree[large][mid] = {};
        if(!tree[large][mid][small]) tree[large][mid][small] = new Array(N).fill(0);
        tree[large][mid][small][idx] += amt;

        if(!largeTotal[large]) largeTotal[large] = new Array(N).fill(0);
        largeTotal[large][idx] += amt;
      }
    });
  });
  document.getElementById('mobileAccordionContainer').innerHTML = buildMobileAccordion(tree, largeTotal, m);
}

function buildMobileAccordion(tree, largeTotal, month){
  const sum = arr => arr.reduce((a, b) => a + b, 0);
  const getValue = arr => month === 0 ? sum(arr) : (arr[month - 1] || 0);

  const order = { "고정지출":0, "변동지출":1 };
  const largeOrder = Object.keys(largeTotal).sort((a, b) => {
    const ao = order[a] !== undefined ? order[a] : 2;
    const bo = order[b] !== undefined ? order[b] : 2;
    return ao !== bo ? ao - bo : a.localeCompare(b, 'ko');
  });

  if(largeOrder.length === 0){
    return `<div style="text-align:center; padding:20px; color:var(--sub); font-size:12px;">지출 내역이 없습니다.</div>`;
  }

  let html = "";
  largeOrder.forEach((large, idx) => {
    const lAmt = getValue(largeTotal[large]);
    if(lAmt === 0) return;

    const mids = tree[large] || {};
    let detailsHtml = "";

    Object.keys(mids).forEach(mid => {
      const smalls = mids[mid];
      Object.keys(smalls).forEach(small => {
        const sAmt = getValue(smalls[small]);
        if(sAmt > 0){
          detailsHtml += `
            <div class="m-detail-row">
              <span class="name">${escapeHtml(mid)} > ${escapeHtml(small)}</span>
              <span>${formatMoney(sAmt)}원</span>
            </div>
          `;
        }
      });
    });

    html += `
      <div class="m-accordion-item" id="accItem_${idx}">
        <div class="m-accordion-header" onclick="toggleAccordion('accItem_${idx}')">
          <span>${escapeHtml(large)}</span>
          <span class="amt">${formatMoney(lAmt)}원 ▾</span>
        </div>
        <div class="m-accordion-body">
          ${detailsHtml}
        </div>
      </div>
    `;
  });

  return html || `<div style="text-align:center; padding:20px; color:var(--sub); font-size:12px;">해당 월 지출 내역이 없습니다.</div>`;
}

function toggleAccordion(id){
  const el = document.getElementById(id);
  if(el) el.classList.toggle('open');
}
