<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>가계부</title>
<style>
  :root{
    --bg:#f6f5f1;
    --ink:#22221f;
    --sub:#6b6a63;
    --line:#e1dfd6;
    --card:#ffffff;
    --accent:#3a5a52;

    --income-bg:#e2eef5; --income-ink:#1f5c82;
    --expense-bg:#fdf3d9; --expense-ink:#8a6d16;
    --saving-bg:#e3ede4;  --saving-ink:#2f6b3c;
    --invest-bg:#f1e7f9;  --invest-ink:#6b3fa0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    background:var(--bg);
    color:var(--ink);
    padding:32px 20px 80px;
  }
  .wrap{max-width:1180px;margin:0 auto;}

  header{margin-bottom:20px;}
  .home-btn{
    display:inline-block;
    font-size:12.5px;
    color:var(--sub);
    text-decoration:none;
    margin-bottom:8px;
  }
  .home-btn:hover{color:var(--accent);}
  h1{font-size:26px;letter-spacing:-0.02em;margin:0 0 4px;}
  header p{margin:0;color:var(--sub);font-size:13.5px;}

  /* 직관적인 월 선택 UI 스타일 */
  .month-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 24px 20px;
    margin-bottom: 20px;
  }
  .month-controls {
    display: flex;
    align-items: center;
    gap: 24px;
    margin-bottom: 14px;
  }
  .month-controls button {
    background: var(--bg);
    border: 1px solid var(--line);
    border-radius: 50%;
    width: 42px;
    height: 42px;
    font-size: 16px;
    color: var(--sub);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
  }
  .month-controls button:hover {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }
  .current-month {
    font-size: 26px;
    font-weight: 700;
    min-width: 90px;
    text-align: center;
    color: var(--ink);
  }
  .month-mini-summary {
    font-size: 14px;
    color: var(--sub);
    background: var(--bg);
    padding: 8px 20px;
    border-radius: 20px;
    display: inline-flex;
    align-items: center;
  }
  .month-mini-summary .income-text { color: var(--income-ink); font-weight: 700; }
  .month-mini-summary .expense-text { color: var(--expense-ink); font-weight: 700; }
  .month-mini-summary .divider { margin: 0 12px; color: #d1cfc4; }

  .summary{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-bottom:22px;
  }
  .sum-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 16px;
  }
  .sum-card .num{font-size:19px;font-weight:700;}
  .sum-card .lbl{font-size:12px;color:var(--sub);margin-top:2px;}
  .sum-card.income .num{color:var(--income-ink);}
  .sum-card.expense .num{color:var(--expense-ink);}
  .sum-card.saving .num{color:var(--saving-ink);}
  .sum-card.invest .num{color:var(--invest-ink);}

  .panel{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
  }
  .panel h2{
    font-size:15px;
    margin:0 0 14px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .panel h2::before{
    content:"";
    width:6px;height:6px;border-radius:50%;
    background:var(--accent);
    display:inline-block;
  }

  .form-grid{
    display:grid;
    grid-template-columns:90px 100px 1fr 1fr 1fr 110px 100px 100px 1fr;
    gap:8px;
    align-items:end;
  }
  .field label{
    display:block;
    font-size:11px;
    color:var(--sub);
    margin-bottom:4px;
  }
  input, select{
    width:100%;
    padding:8px 9px;
    border:1px solid var(--line);
    border-radius:7px;
    font-size:13px;
    background:#fff;
    color:var(--ink);
    font-family:inherit;
  }
  input:focus, select:focus{outline:none;border-color:var(--accent);}
  .add-btn{
    grid-column:1/-1;
    justify-self:start;
    margin-top:4px;
    background:var(--accent);
    color:#fff;
    border:none;
    padding:10px 22px;
    border-radius:7px;
    font-size:13.5px;
    font-weight:600;
    cursor:pointer;
  }
  .add-btn:hover{opacity:0.9;}
  .add-btn:disabled{opacity:0.5;cursor:not-allowed;}

  .type-select{font-weight:700;}
  .type-select.수입{background:var(--income-bg);color:var(--income-ink);}
  .type-select.지출{background:var(--expense-bg);color:var(--expense-ink);}
  .type-select.저축{background:var(--saving-bg);color:var(--saving-ink);}
  .type-select.투자{background:var(--invest-bg);color:var(--invest-ink);}

  table{width:100%;border-collapse:collapse;font-size:13px;}
  thead th{
    text-align:left;
    font-size:11.5px;
    color:var(--sub);
    font-weight:600;
    padding:0 8px 8px;
    border-bottom:1px solid var(--line);
    white-space:nowrap;
  }
  tbody td{
    padding:9px 8px;
    border-bottom:1px solid var(--line);
    vertical-align:middle;
  }
  tbody tr:hover{background:#fafaf7;}
  .type-badge{
    font-size:11px;
    font-weight:700;
    padding:2px 8px;
    border-radius:12px;
    white-space:nowrap;
  }
  .type-badge.수입{background:var(--income-bg);color:var(--income-ink);}
  .type-badge.지출{background:var(--expense-bg);color:var(--expense-ink);}
  .type-badge.저축{background:var(--saving-bg);color:var(--saving-ink);}
  .type-badge.투자{background:var(--invest-bg);color:var(--invest-ink);}
  .amount-cell{font-weight:700;text-align:right;white-space:nowrap;}
  .cat-cell{color:var(--sub);font-size:12px;}
  .del-btn{
    background:none;border:none;color:#b7b5ac;cursor:pointer;font-size:15px;line-height:1;
  }
  .del-btn:hover{color:#b3452f;}
  .edit-btn{
    background:none;border:none;color:#b7b5ac;cursor:pointer;font-size:13px;margin-right:4px;
  }
  .edit-btn:hover{color:var(--accent);}

  .empty{text-align:center;padding:50px 0;color:var(--sub);font-size:13.5px;}

  #appContent{display:none;}

  /* ---- 연간 한눈에 보기 (PC 전용 스타일) ---- */
  .yearly-panel{padding-bottom:16px;}
  .yearly-pc { display: block; }
  .yearly-mobile { display: none; }

  .yearly-scroll{overflow-x:auto;border-radius:8px;}
  .yearly-scroll + .yearly-scroll{margin-top:16px;}
  table.yearly-table{width:100%;border-collapse:collapse;font-size:12.5px;white-space:nowrap;}
  .yearly-table th{
    padding:8px 10px;
    text-align:right;
    font-weight:600;
    color:var(--sub);
    background:var(--bg);
    border-bottom:1px solid var(--line);
  }
  .yearly-table th.label{text-align:left;color:var(--ink);}
  .yearly-table td{
    padding:7px 10px;
    text-align:right;
    border-bottom:1px solid #eee;
  }
  .yearly-table td.label{text-align:left;color:var(--sub);}
  .yearly-table tr.balance-row td, .yearly-table tr.balance-row th{background:var(--saving-bg);}
  .yearly-table tr.balance-row td.label{color:var(--saving-ink);font-weight:600;}
  .yearly-table tr.total-row td{background:var(--expense-bg);font-weight:700;color:var(--expense-ink);}
  .yearly-table tr.total-row td.label{color:var(--expense-ink);}
  .yearly-table tr.sub-total-row td{background:#fbeceb;font-weight:600;}
  .yearly-table tr.sub-total-row td.label{color:#9a4a44;}
  .yearly-table tr.detail-row td{background:#fff;color:var(--ink);}
  .yearly-table tr.detail-row:hover td{background:#fafaf7;}
  .yearly-loading{padding:20px 0;text-align:center;color:var(--sub);font-size:13px;}

  /* ============================================================
     📱 모바일 반응형 최적화 (900px 이하)
     ============================================================ */
  @media (max-width: 900px) {
    body { padding: 16px 12px 60px; }
    
    /* 연간보기 모바일 버전 켜기 / PC 스크롤 표 숨기기 */
    .yearly-pc { display: none; }
    .yearly-mobile { display: block; }

    /* 모바일 연간 요약 카드 */
    .m-yearly-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 14px;
    }
    .m-y-card {
      background: var(--bg);
      border-radius: 8px;
      padding: 10px 12px;
      border: 1px solid var(--line);
    }
    .m-y-card .lbl { font-size: 11px; color: var(--sub); }
    .m-y-card .val { font-size: 15px; font-weight: 700; margin-top: 2px; }
    .m-y-card.balance .val { color: var(--saving-ink); }
    .m-y-card.rate .val { color: var(--income-ink); }

    /* 모바일 연간 월 선택 칩 스크롤 */
    .m-month-chips {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      padding-bottom: 8px;
      margin-bottom: 12px;
      -webkit-overflow-scrolling: touch;
    }
    .m-chip {
      flex: 0 0 auto;
      padding: 6px 12px;
      border-radius: 16px;
      background: var(--bg);
      border: 1px solid var(--line);
      font-size: 12px;
      color: var(--sub);
      cursor: pointer;
    }
    .m-chip.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
      font-weight: 700;
    }

    /* 모바일 지출 카테고리 아코디언 */
    .m-accordion-item {
      border: 1px solid var(--line);
      border-radius: 8px;
      margin-bottom: 6px;
      overflow: hidden;
      background: #fff;
    }
    .m-accordion-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      background: #fafaf7;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }
    .m-accordion-header .amt { color: var(--expense-ink); }
    .m-accordion-body {
      display: none;
      padding: 8px 12px;
      border-top: 1px dashed var(--line);
      font-size: 12px;
    }
    .m-accordion-item.open .m-accordion-body { display: block; }
    .m-detail-row {
      display: flex;
      justify-content: space-between;
      padding: 4px 0;
      color: var(--sub);
    }
    .m-detail-row .name { color: var(--ink); }

    /* 일반 월 선택 및 폼 모바일 최적화 */
    .month-header { padding: 16px 12px; }
    .current-month { font-size: 22px; }
    .month-mini-summary { font-size: 12px; padding: 6px 14px; }
    
    .form-grid {
      grid-template-columns: 1fr !important;
      gap: 10px;
    }
    .add-btn {
      width: 100%;
      padding: 12px;
      text-align: center;
    }
    
    /* 내역 테이블 카드화 */
    table, thead, tbody, th, td, tr { display: block; }
    thead { display: none; }
    
    tbody tr {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 10px;
      margin-bottom: 12px;
      padding: 14px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.03);
    }
    
    tbody td {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      border-bottom: 1px solid #f2f1ed;
    }
    tbody td:last-child { 
      border-bottom: none; 
      justify-content: flex-end;
      padding-top: 10px;
    }
    
    tbody td::before {
      content: attr(data-label);
      font-size: 12px;
      color: var(--sub);
      font-weight: 600;
    }
  }
</style>
</head>
<body>
<div class="wrap" id="appContent">

  <header>
    <a href="./index.html" class="home-btn">← 홈</a>
    <h1>가계부</h1>
    <p>수입·지출·저축·투자를 한 곳에서 기록하고 관리합니다.</p>
  </header>

  <!-- 연간 한눈에 보기 -->
  <div class="panel yearly-panel">
    <h2>연간 한눈에 보기</h2>
    <div id="yearlySummary">
      <div class="yearly-loading">연간 데이터를 불러오는 중...</div>
    </div>
  </div>

  <!-- 변경된 월 선택 UI -->
  <div class="month-header">
    <div class="month-controls">
      <button onclick="changeMonth(-1)">❮</button>
      <div class="current-month" id="monthDisplay">7월</div>
      <button onclick="changeMonth(1)">❯</button>
    </div>
    <div class="month-mini-summary">
      <span class="income-text">수입 <span id="miniIncome">0</span>원</span>
      <span class="divider">|</span>
      <span class="expense-text">지출 <span id="miniExpense">0</span>원</span>
    </div>
  </div>

  <div class="summary" id="summary"></div>

  <div class="panel">
    <h2>새 거래 추가</h2>
    <div class="form-grid">
      <div class="field">
        <label>날짜</label>
        <input type="date" id="in-date">
      </div>
      <div class="field">
        <label>구분</label>
        <select id="in-type" class="type-select" onchange="onTypeChange()"></select>
      </div>
      <div class="field">
        <label>대분류</label>
        <select id="in-large" onchange="onLargeChange()"></select>
      </div>
      <div class="field">
        <label>중분류</label>
        <select id="in-mid" onchange="onMidChange()"></select>
      </div>
      <div class="field">
        <label>소분류</label>
        <select id="in-small"></select>
      </div>
      <div class="field">
        <label>세부내용</label>
        <input type="text" id="in-detail" placeholder="예: 마트 장보기">
      </div>
      <div class="field">
        <label>금액</label>
        <input type="number" id="in-amount" placeholder="0">
      </div>
      <div class="field">
        <label>결제수단</label>
        <input type="text" id="in-payment" placeholder="예: 현대카드">
      </div>
      <div class="field">
        <label>비고</label>
        <input type="text" id="in-note" placeholder="선택">
      </div>
      <button class="add-btn" id="addBtn" onclick="addEntry()">+ 추가하기</button>
    </div>
  </div>

  <div class="panel">
    <table>
      <thead>
        <tr>
          <th>날짜</th>
          <th>구분</th>
          <th>카테고리</th>
          <th>세부내용</th>
          <th>금액</th>
          <th>결제수단</th>
          <th>비고</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="emptyMsg" style="display:none;">이번 달 거래 내역이 없어요.</div>
  </div>

</div>

<script>
/* ===========================================================
   Apps Script 연동 설정
   =========================================================== */
const API_URL = "https://script.google.com/macros/s/AKfycbz7JN-W--kgA4ZONXyNVBrc1Fl4n4xw1SNv1dNYIJW-nVBkSE42hXlBjT3bxXFECyNHhA/exec";
const SITE_KEY = "130702"; 

let categories = { "수입":[], "지출":[], "저축":[], "투자":[] };
let entries = [];
let currentMonth = new Date().getMonth() + 1;
let editingRowIndex = null;
let cachedMonthsData = null; // 모바일 탭 변경용 캐시
let selectedMobileMonth = 0; // 0: 연간 합계, 1~12: 해당 월

const TYPES = ["수입","지출","저축","투자"];

function escapeHtml(str){
  return (str||"").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function formatMoney(n){
  return (Number(n)||0).toLocaleString('ko-KR');
}

// ---- 직관적인 월 선택 (좌우 이동) ----
function updateMonthDisplay(){
  document.getElementById('monthDisplay').textContent = currentMonth + "월";
}

function changeMonth(offset){
  let newMonth = currentMonth + offset;
  if(newMonth < 1) newMonth = 12;
  if(newMonth > 12) newMonth = 1;
  currentMonth = newMonth;
  
  updateMonthDisplay();
  loadEntries();
}

// ---- 카테고리 로드 & 캐스케이딩 선택 ----
async function loadCategories(){
  try{
    const res = await fetch(`${API_URL}?key=${encodeURIComponent(SITE_KEY)}&resource=categories`, { cache:"no-store" });
    const data = await res.json();
    if(data.ok && data.categories) categories = data.categories;
  }catch(e){
    console.error("카테고리 로드 실패:", e);
  }
  initTypeSelect();
}

function initTypeSelect(){
  const sel = document.getElementById('in-type');
  sel.innerHTML = TYPES.map(t => `<option value="${t}">${t}</option>`).join('');
  sel.className = "type-select " + sel.value;
  onTypeChange();
}

function onTypeChange(){
  const sel = document.getElementById('in-type');
  sel.className = "type-select " + sel.value;
  const list = categories[sel.value] || [];
  const larges = [...new Set(list.map(c => c.large))].filter(Boolean);
  const largeSel = document.getElementById('in-large');
  largeSel.innerHTML = larges.map(l => `<option value="${escapeHtml(l)}">${escapeHtml(l)}</option>`).join('');
  onLargeChange();
}

function onLargeChange(){
  const type = document.getElementById('in-type').value;
  const large = document.getElementById('in-large').value;
  const list = (categories[type] || []).filter(c => c.large === large);
  const mids = [...new Set(list.map(c => c.mid))].filter(Boolean);
  const midSel = document.getElementById('in-mid');
  midSel.innerHTML = `<option value="">- 선택 안함 -</option>` + mids.map(m => `<option value="${escapeHtml(m)}">${escapeHtml(m)}</option>`).join('');
  onMidChange();
}

function onMidChange(){
  const type = document.getElementById('in-type').value;
  const large = document.getElementById('in-large').value;
  const mid = document.getElementById('in-mid').value;
  const list = (categories[type] || []).filter(c => c.large === large && c.mid === mid);
  const smalls = [...new Set(list.map(c => c.small))].filter(Boolean);
  const smallSel = document.getElementById('in-small');
  smallSel.innerHTML = `<option value="">- 선택 안함 -</option>` + smalls.map(s => `<option value="${escapeHtml(s)}">${escapeHtml(s)}</option>`).join('');
}

// ---- 연간 한눈에 보기 ----
async function fetchMonthEntries(month){
  try{
    const res = await fetch(`${API_URL}?key=${encodeURIComponent(SITE_KEY)}&resource=ledger&month=${month}`, { cache:"no-store" });
    const data = await res.json();
    if(data.ok && Array.isArray(data.items)) return data.items;
  }catch(e){
    console.error(`${month}월 데이터 로드 실패:`, e);
  }
  return [];
}

async function loadYearlySummary(){
  const monthsData = await Promise.all(
    Array.from({length:12}, (_, i) => fetchMonthEntries(i + 1))
  );
  cachedMonthsData = monthsData;
  renderYearlySummary(monthsData);
}

function renderYearlySummary(monthsData){
  const N = 12;
  const incomeByMonth = new Array(N).fill(0);
  const tree = {};       // tree[large][mid][small] = [12개월 금액]
  const largeTotal = {}; // largeTotal[large] = [12개월 금액]

  monthsData.forEach((entries, idx) => {
    entries.forEach(it => {
      const amt = Number(it.amount) || 0;
      if(it.type === "수입"){
        incomeByMonth[idx] += amt;
      } else if(it.type === "지출"){
        const large = it.large || "기타";
        const mid = it.mid || "기타";
        const small = it.small || "기타";

        if(!tree[large]) tree[large] = {};
        if(!tree[large][mid]) tree[large][mid] = {};
        if(!tree[large][mid][small]) tree[large][mid][small] = new Array(N).fill(0);
        tree[large][mid][small][idx] += amt;

        if(!largeTotal[large]) largeTotal[large] = new Array(N).fill(0);
        largeTotal[large][idx] += amt;
      }
    });
  });

  const totalExpenseByMonth = new Array(N).fill(0);
  Object.values(largeTotal).forEach(arr => arr.forEach((v, i) => totalExpenseByMonth[i] += v));

  const balanceByMonth = incomeByMonth.map((inc, i) => inc - totalExpenseByMonth[i]);
  const savingRateByMonth = incomeByMonth.map((inc, i) => inc > 0 ? (balanceByMonth[i] / inc * 100) : null);
  const sum = arr => arr.reduce((a, b) => a + b, 0);

  // ==========================================
  // 1. PC용 렌더링 (기존 12개월 테이블 구조 유지)
  // ==========================================
  const monthHeaders = Array.from({length:N}, (_, i) => `<th>${i+1}월</th>`).join('');

  const pcTable1 = `
    <table class="yearly-table">
      <thead>
        <tr><th class="label" colspan="2">수입 - 지출</th>${monthHeaders}<th>연간 Balance</th></tr>
      </thead>
      <tbody>
        <tr class="balance-row">
          <td class="label" colspan="2">금액</td>
          ${balanceByMonth.map(v => `<td>${formatMoney(v)}</td>`).join('')}
          <td>${formatMoney(sum(balanceByMonth))}</td>
        </tr>
        <tr class="balance-row">
          <td class="label" colspan="2">저축율</td>
          ${savingRateByMonth.map(v => `<td>${v===null ? '-' : v.toFixed(2)+'%'}</td>`).join('')}
          <td></td>
        </tr>
      </tbody>
    </table>
  `;

  const order = { "고정지출":0, "변동지출":1 };
  const largeOrder = Object.keys(largeTotal).sort((a, b) => {
    const ao = order[a] !== undefined ? order[a] : 2;
    const bo = order[b] !== undefined ? order[bo] : 2;
    return ao !== bo ? ao - bo : a.localeCompare(b, 'ko');
  });

  let pcRows = `<tr class="total-row"><td class="label" colspan="3">지출 합계</td>${totalExpenseByMonth.map(v => `<td>${formatMoney(v)}</td>`).join('')}<td>${formatMoney(sum(totalExpenseByMonth))}</td></tr>`;

  largeOrder.forEach(large => {
    pcRows += `<tr class="sub-total-row"><td class="label" colspan="3">${escapeHtml(large)}</td>${largeTotal[large].map(v => `<td>${formatMoney(v)}</td>`).join('')}<td>${formatMoney(sum(largeTotal[large]))}</td></tr>`;
  });

  largeOrder.forEach(large => {
    const mids = tree[large] || {};
    Object.keys(mids).forEach(mid => {
      const smalls = mids[mid];
      Object.keys(smalls).forEach(small => {
        const arr = smalls[small];
        pcRows += `<tr class="detail-row">
          <td class="label">${escapeHtml(large)}</td>
          <td class="label">${escapeHtml(mid)}</td>
          <td class="label">${escapeHtml(small)}</td>
          ${arr.map(v => `<td>${formatMoney(v)}</td>`).join('')}
          <td>${formatMoney(sum(arr))}</td>
        </tr>`;
      });
    });
  });

  const pcTable2 = `
    <table class="yearly-table">
      <thead>
        <tr><th class="label">대분류</th><th class="label">중분류</th><th class="label">소분류</th>${monthHeaders}<th>합계</th></tr>
      </thead>
      <tbody>${pcRows}</tbody>
    </table>
  `;

  // ==========================================
  // 2. 모바일용 렌더링 (카드 + 월별 아코디언)
  // ==========================================
  const totalIncome = sum(incomeByMonth);
  const totalExpense = sum(totalExpenseByMonth);
  const totalBalance = sum(balanceByMonth);
  const validRates = savingRateByMonth.filter(r => r !== null);
  const avgRate = validRates.length > 0 ? (validRates.reduce((a,b)=>a+b,0) / validRates.length).toFixed(1) : '-';

  const mobileSummaryCards = `
    <div class="m-yearly-cards">
      <div class="m-y-card"><div class="lbl">연간 총수입</div><div class="val">${formatMoney(totalIncome)}원</div></div>
      <div class="m-y-card"><div class="lbl">연간 총지출</div><div class="val">${formatMoney(totalExpense)}원</div></div>
      <div class="m-y-card balance"><div class="lbl">연간 순수익(Balance)</div><div class="val">${formatMoney(totalBalance)}원</div></div>
      <div class="m-y-card rate"><div class="lbl">평균 저축률</div><div class="val">${avgRate}%</div></div>
    </div>
  `;

  let mobileChips = `<div class="m-month-chips">`;
  mobileChips += `<button class="m-chip ${selectedMobileMonth===0?'active':''}" onclick="selectMobileMonth(0)">연간 합계</button>`;
  for(let m=1; m<=12; m++){
    mobileChips += `<button class="m-chip ${selectedMobileMonth===m?'active':''}" onclick="selectMobileMonth(${m})">${m}월</button>`;
  }
  mobileChips += `</div>`;

  const mobileAccordion = buildMobileAccordion(tree, largeTotal, selectedMobileMonth);

  // 최종 결합
  document.getElementById('yearlySummary').innerHTML = `
    <div class="yearly-pc">
      <div class="yearly-scroll">${pcTable1}</div>
      <div class="yearly-scroll">${pcTable2}</div>
    </div>
    <div class="yearly-mobile">
      ${mobileSummaryCards}
      ${mobileChips}
      <div id="mobileAccordionContainer">${mobileAccordion}</div>
    </div>
  `;
}

function selectMobileMonth(m){
  selectedMobileMonth = m;
  const chips = document.querySelectorAll('.m-chip');
  chips.forEach((c, idx) => {
    if(idx === m) c.classList.add('active');
    else c.classList.remove('active');
  });

  if(cachedMonthsData){
    // 트리 재계산
    const N = 12;
    const tree = {};
    const largeTotal = {};
    cachedMonthsData.forEach((entries, idx) => {
      entries.forEach(it => {
        if(it.type === "지출"){
          const amt = Number(it.amount) || 0;
          const large = it.large || "기타";
          const mid = it.mid || "기타";
          const small = it.small || "기타";

          if(!tree[large]) tree[large] = {};
          if(!tree[large][mid]) tree[large][mid] = {};
          if(!tree[large][mid][small]) tree[large][mid][small] = new Array(N).fill(0);
          tree[large][mid][small][idx] += amt;

          if(!largeTotal[large]) largeTotal[large] = new Array(N).fill(0);
          largeTotal[large][idx] += amt;
        }
      });
    });
    document.getElementById('mobileAccordionContainer').innerHTML = buildMobileAccordion(tree, largeTotal, m);
  }
}

function buildMobileAccordion(tree, largeTotal, month){
  const sum = arr => arr.reduce((a, b) => a + b, 0);
  const getValue = arr => month === 0 ? sum(arr) : (arr[month - 1] || 0);

  const order = { "고정지출":0, "변동지출":1 };
  const largeOrder = Object.keys(largeTotal).sort((a, b) => {
    const ao = order[a] !== undefined ? order[a] : 2;
    const bo = order[b] !== undefined ? order[b] : 2;
    return ao !== bo ? ao - bo : a.localeCompare(b, 'ko');
  });

  if(largeOrder.length === 0){
    return `<div style="text-align:center; padding:20px; color:var(--sub); font-size:12px;">지출 내역이 없습니다.</div>`;
  }

  let html = "";
  largeOrder.forEach((large, idx) => {
    const lAmt = getValue(largeTotal[large]);
    if(lAmt === 0) return;

    const mids = tree[large] || {};
    let detailsHtml = "";

    Object.keys(mids).forEach(mid => {
      const smalls = mids[mid];
      Object.keys(smalls).forEach(small => {
        const sAmt = getValue(smalls[small]);
        if(sAmt > 0){
          detailsHtml += `
            <div class="m-detail-row">
              <span class="name">${escapeHtml(mid)} > ${escapeHtml(small)}</span>
              <span>${formatMoney(sAmt)}원</span>
            </div>
          `;
        }
      });
    });

    html += `
      <div class="m-accordion-item" id="accItem_${idx}">
        <div class="m-accordion-header" onclick="toggleAccordion('accItem_${idx}')">
          <span>${escapeHtml(large)}</span>
          <span class="amt">${formatMoney(lAmt)}원 ▾</span>
        </div>
        <div class="m-accordion-body">
          ${detailsHtml}
        </div>
      </div>
    `;
  });

  return html || `<div style="text-align:center; padding:20px; color:var(--sub); font-size:12px;">해당 월 지출 내역이 없습니다.</div>`;
}

function toggleAccordion(id){
  const el = document.getElementById(id);
  if(el) el.classList.toggle('open');
}

// ---- 거래 로드 & 렌더 ----
async function loadEntries(){
  try{
    const res = await fetch(`${API_URL}?key=${encodeURIComponent(SITE_KEY)}&resource=ledger&month=${currentMonth}`, { cache:"no-store" });
    const data = await res.json();
    if(data.ok && Array.isArray(data.items)) entries = data.items;
  }catch(e){
    console.error("거래 로드 실패:", e);
  }
  render();
}

function render(){
  renderSummary();
  renderTable();
}

function renderSummary(){
  const totals = { "수입":0, "지출":0, "저축":0, "투자":0 };
  entries.forEach(it => { if(totals[it.type] !== undefined) totals[it.type] += it.amount; });

  document.getElementById('summary').innerHTML = `
    <div class="sum-card income"><div class="num">${formatMoney(totals["수입"])}원</div><div class="lbl">수입</div></div>
    <div class="sum-card expense"><div class="num">${formatMoney(totals["지출"])}원</div><div class="lbl">지출</div></div>
    <div class="sum-card saving"><div class="num">${formatMoney(totals["저축"])}원</div><div class="lbl">저축</div></div>
    <div class="sum-card invest"><div class="num">${formatMoney(totals["투자"])}원</div><div class="lbl">투자</div></div>
  `;

  document.getElementById('miniIncome').textContent = formatMoney(totals["수입"]);
  document.getElementById('miniExpense').textContent = formatMoney(totals["지출"]);
}

function renderTable(){
  const tbody = document.getElementById('tbody');
  const emptyMsg = document.getElementById('emptyMsg');

  if(entries.length === 0){
    tbody.innerHTML = "";
    emptyMsg.style.display = "block";
    return;
  }
  emptyMsg.style.display = "none";

  const sorted = entries.slice().sort((a,b) => (a.date||"").localeCompare(b.date||""));

  tbody.innerHTML = sorted.map(it => `
    <tr>
      <td data-label="날짜">${escapeHtml(it.date)}</td>
      <td data-label="구분"><span class="type-badge ${it.type}">${escapeHtml(it.type)}</span></td>
      <td data-label="카테고리" class="cat-cell">
        ${escapeHtml(it.large)}
        ${it.mid ? ' · ' + escapeHtml(it.mid) : ''}
        ${it.small ? ' · ' + escapeHtml(it.small) : ''}
      </td>
      <td data-label="세부내용">${escapeHtml(it.detail)}</td>
      <td data-label="금액" class="amount-cell">${formatMoney(it.amount)}원</td>
      <td data-label="결제수단">${escapeHtml(it.payment) || '-'}</td>
      <td data-label="비고">${escapeHtml(it.note) || '-'}</td>
      <td data-label="">
        <button class="edit-btn" onclick="startEdit(${it.rowIndex})">수정</button>
        <button class="del-btn" onclick="deleteEntry(${it.rowIndex})">✕</button>
      </td>
    </tr>
  `).join('');
}

// ---- 추가/수정/삭제 ----
function collectFormItem(){
  return {
    date: document.getElementById('in-date').value,
    type: document.getElementById('in-type').value,
    large: document.getElementById('in-large').value,
    mid: document.getElementById('in-mid').value,
    small: document.getElementById('in-small').value,
    detail: document.getElementById('in-detail').value.trim(),
    amount: Number(document.getElementById('in-amount').value) || 0,
    payment: document.getElementById('in-payment').value.trim(),
    review: "",
    note: document.getElementById('in-note').value.trim()
  };
}

function resetForm(){
  document.getElementById('in-date').value = "";
  document.getElementById('in-detail').value = "";
  document.getElementById('in-amount').value = "";
  document.getElementById('in-payment').value = "";
  document.getElementById('in-note').value = "";
  
  document.getElementById('in-type').selectedIndex = 0;
  onTypeChange();
  
  editingRowIndex = null;
  document.getElementById('addBtn').textContent = "+ 추가하기";
}

async function addEntry(){
  const item = collectFormItem();
  if(!item.date){ alert('날짜를 입력해주세요.'); return; }
  if(!item.amount){ alert('금액을 입력해주세요.'); return; }

  const btn = document.getElementById('addBtn');
  btn.disabled = true;

  try{
    let res, data;
    if(editingRowIndex){
      res = await fetch(API_URL, {
        method:"POST",
        headers:{"Content-Type":"text/plain;charset=utf-8"},
        body: JSON.stringify({ action:"update", key:SITE_KEY, month:currentMonth, rowIndex:editingRowIndex, item })
      });
    } else {
      res = await fetch(API_URL, {
        method:"POST",
        headers:{"Content-Type":"text/plain;charset=utf-8"},
        body: JSON.stringify({ action:"add", key:SITE_KEY, month:currentMonth, item })
      });
    }
    data = await res.json();
    if(!data.ok) throw new Error(data.error);
    entries = data.items;
  }catch(err){
    alert("저장 실패: " + err.message);
    btn.disabled = false;
    return;
  }

  resetForm();
  btn.disabled = false;
  render();
  loadYearlySummary();
}

function startEdit(rowIndex){
  const it = entries.find(e => e.rowIndex === rowIndex);
  if(!it) return;

  document.getElementById('in-date').value = it.date;
  
  document.getElementById('in-type').value = it.type;
  onTypeChange();
  
  if (it.large) document.getElementById('in-large').value = it.large;
  onLargeChange();
  
  if (it.mid) document.getElementById('in-mid').value = it.mid;
  onMidChange();
  
  if (it.small) document.getElementById('in-small').value = it.small;

  document.getElementById('in-detail').value = it.detail;
  document.getElementById('in-amount').value = it.amount;
  document.getElementById('in-payment').value = it.payment;
  document.getElementById('in-note').value = it.note;

  editingRowIndex = rowIndex;
  document.getElementById('addBtn').textContent = "수정 완료";
  window.scrollTo({top:0, behavior:'smooth'});
}

async function deleteEntry(rowIndex){
  if(!confirm('이 거래를 삭제할까요?')) return;
  try{
    const res = await fetch(API_URL, {
      method:"POST",
      headers:{"Content-Type":"text/plain;charset=utf-8"},
      body: JSON.stringify({ action:"delete", key:SITE_KEY, month:currentMonth, rowIndex })
    });
    const data = await res.json();
    if(!data.ok) throw new Error(data.error);
    entries = data.items;
  }catch(err){
    alert("삭제 실패: " + err.message);
    return;
  }
  render();
  loadYearlySummary();
}

// ---- 초기화 ----
updateMonthDisplay();
loadCategories().then(loadEntries);
loadYearlySummary();
</script>
