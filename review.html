<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>체험단 당첨 관리</title>
<style>
  :root{
    --bg:#f6f5f1;
    --ink:#22221f;
    --sub:#6b6a63;
    --line:#e1dfd6;
    --card:#ffffff;
    --accent:#3a5a52;

    --wait-bg:#fdf3d9;   --wait-ink:#8a6d16;
    --conf-bg:#e2eef5;   --conf-ink:#1f5c82;
    --done-bg:#e3ede4;   --done-ink:#2f6b3c;
    --end-bg:#ececea;    --end-ink:#78766e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    background:var(--bg);
    color:var(--ink);
    padding:32px 20px 80px;
  }
  .wrap{max-width:1180px;margin:0 auto;}

  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:16px;
    margin-bottom:24px;
  }
  h1{
    font-size:26px;
    letter-spacing:-0.02em;
    margin:0 0 4px;
  }
  .home-btn{
    display:inline-block;
    font-size:12.5px;
    color:var(--sub);
    text-decoration:none;
    margin-bottom:8px;
  }
  .home-btn:hover{color:var(--accent);}
  header p{
    margin:0;
    color:var(--sub);
    font-size:13.5px;
  }

  .summary{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-bottom:22px;
  }
  .sum-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 16px;
  }
  .sum-card .num{font-size:22px;font-weight:700;}
  .sum-card .lbl{font-size:12.5px;color:var(--sub);margin-top:2px;}
  .sum-card.wait .num{color:var(--wait-ink);}
  .sum-card.conf .num{color:var(--conf-ink);}
  .sum-card.done .num{color:var(--done-ink);}
  .sum-card.end .num{color:var(--end-ink);}

  .panel{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
  }
  .panel h2{
    font-size:15px;
    margin:0 0 14px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .panel h2::before{
    content:"";
    width:6px;height:6px;border-radius:50%;
    background:var(--accent);
    display:inline-block;
  }

  .form-grid{
    display:grid;
    grid-template-columns:90px 1fr 1.8fr 1.1fr 105px 105px 115px;
    gap:10px;
    align-items:end;
  }
  .field label{
    display:block;
    font-size:12px;
    color:var(--sub);
    margin-bottom:5px;
  }
  input,select{
    width:100%;
    padding:9px 10px;
    border:1px solid var(--line);
    border-radius:7px;
    font-size:13.5px;
    background:#fff;
    color:var(--ink);
    font-family:inherit;
  }
  input:focus,select:focus{
    outline:none;
    border-color:var(--accent);
  }
  .add-btn{
    grid-column:1/-1;
    justify-self:start;
    margin-top:4px;
    background:var(--accent);
    color:#fff;
    border:none;
    padding:10px 22px;
    border-radius:7px;
    font-size:13.5px;
    font-weight:600;
    cursor:pointer;
  }
  .add-btn:hover{opacity:0.9;}

  .toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:12px;
    margin-bottom:12px;
  }
  .tabs{display:flex;gap:6px;flex-wrap:wrap;}
  .tab{
    border:1px solid var(--line);
    background:#fff;
    padding:7px 14px;
    border-radius:20px;
    font-size:13px;
    cursor:pointer;
    color:var(--sub);
  }
  .tab.active{
    background:var(--ink);
    color:#fff;
    border-color:var(--ink);
  }
  .io-btns{display:flex;gap:8px;}
  .io-btns button{
    border:1px solid var(--line);
    background:#fff;
    padding:7px 12px;
    border-radius:7px;
    font-size:12.5px;
    cursor:pointer;
    color:var(--sub);
  }
  .io-btns button:hover{border-color:var(--accent);color:var(--accent);}
  #importFile{display:none;}

  table{
    width:100%;
    border-collapse:collapse;
    font-size:13.5px;
  }
  thead th{
    text-align:left;
    font-size:12px;
    color:var(--sub);
    font-weight:600;
    padding:0 10px 10px;
    border-bottom:1px solid var(--line);
    white-space:nowrap;
  }
  tbody td{
    padding:12px 10px;
    border-bottom:1px solid var(--line);
    vertical-align:middle;
  }
  tbody tr:hover{background:#fafaf7;}
  .region-badge{
    font-size:11.5px;
    padding:2px 8px;
    border-radius:5px;
    background:#eef0ec;
    color:var(--sub);
    white-space:nowrap;
  }
  .name-cell{font-weight:600;}
  .deadline-cell.urgent{color:#b3452f;font-weight:600;}
  .status-select{
    font-size:12.5px;
    padding:6px 8px;
    border-radius:6px;
    border:1px solid transparent;
    font-weight:600;
    cursor:pointer;
  }
  .status-wait{background:var(--wait-bg);color:var(--wait-ink);}
  .status-confirm{background:var(--conf-bg);color:var(--conf-ink);}
  .status-done{background:var(--done-bg);color:var(--done-ink);}
  .status-end{background:var(--end-bg);color:var(--end-ink);}

  .platform-select{
    font-size:12.5px;
    padding:6px 8px;
    border-radius:6px;
    border:1px solid var(--line);
    background:#f5f4f0;
    color:var(--ink);
    cursor:pointer;
  }

  .address-input{
    font-size:12.5px;
    padding:6px 8px;
    min-width:140px;
  }

  .resv-input{
    font-size:12px;
    padding:5px 6px;
    margin-top:5px;
    width:100%;
  }
  .del-btn{
    background:none;
    border:none;
    color:#b7b5ac;
    cursor:pointer;
    font-size:16px;
    line-height:1;
  }
  .del-btn:hover{color:#b3452f;}

  .empty{
    text-align:center;
    padding:50px 0;
    color:var(--sub);
    font-size:13.5px;
  }
  #appContent{display:none;}

  @media (max-width:820px){
    .form-grid{grid-template-columns:1fr 1fr;}
    .summary{grid-template-columns:repeat(2,1fr);}
    table, thead, tbody, th, td, tr{display:block;}
    thead{display:none;}
    tbody tr{
      border:1px solid var(--line);
      border-radius:10px;
      margin-bottom:10px;
      padding:10px 12px;
    }
    tbody td{border:none;padding:6px 0;}
    tbody td::before{
      content:attr(data-label);
      display:block;
      font-size:11px;
      color:var(--sub);
      margin-bottom:2px;
    }
  }

  /* ---- AI 이미지 자동등록 ---- */
  .ai-panel{border-color:var(--accent);}
  .ai-panel h2{justify-content:space-between;}
  .ai-badge{
    background:var(--accent);
    color:#fff;
    font-size:10.5px;
    font-weight:700;
    padding:2px 8px;
    border-radius:20px;
    margin-left:auto;
  }
  .ai-desc{
    font-size:12.5px;
    color:var(--sub);
    margin:-6px 0 14px;
    line-height:1.5;
  }
  .ai-upload-row{
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:14px;
  }
  .ai-upload-btn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:#eef0ec;
    color:var(--ink);
    border:1px solid var(--line);
    padding:9px 16px;
    border-radius:8px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
  }
  .ai-upload-btn:hover{border-color:var(--accent);}
  .ai-upload-btn input{display:none;}
  .ai-file-name{font-size:12.5px;color:var(--sub);}

  .ai-preview-wrap{
    display:flex;
    align-items:center;
    gap:14px;
    margin-bottom:14px;
  }
  .ai-preview-img{
    max-width:120px;
    max-height:120px;
    border-radius:8px;
    border:1px solid var(--line);
    object-fit:cover;
  }
  .ai-analyze-btn{
    background:var(--accent);
    color:#fff;
    border:none;
    padding:10px 18px;
    border-radius:7px;
    font-size:13.5px;
    font-weight:600;
    cursor:pointer;
  }
  .ai-analyze-btn:hover{opacity:0.9;}
  .ai-analyze-btn:disabled{opacity:0.5;cursor:default;}

  .ai-status{
    font-size:12.5px;
    color:var(--sub);
    margin-bottom:14px;
  }

  .ai-result-grid{
    display:grid;
    grid-template-columns:90px 1fr 1.8fr 1.1fr 140px 140px;
    gap:10px;
    align-items:end;
  }
  .ai-result-actions{
    grid-column:1/-1;
    display:flex;
    gap:10px;
    margin-top:4px;
  }
  .ai-cancel-btn{
    background:none;
    border:1px solid var(--line);
    color:var(--sub);
    padding:10px 18px;
    border-radius:7px;
    font-size:13.5px;
    cursor:pointer;
  }
  .ai-cancel-btn:hover{border-color:var(--accent);color:var(--accent);}

  @media (max-width:820px){
    .ai-result-grid{grid-template-columns:1fr 1fr;}
  }
</style>
</head>
<body>
<div class="wrap" id="appContent">

  <header>
    <div>
      <a href="./index.html" class="home-btn">← 홈</a>
      <h1>블로그 체험단 관리</h1>
      <p>당첨된 체험단을 등록하고 예약·완료 상태를 관리하세요.</p>
    </div>
  </header>

  <div class="summary" id="summary"></div>

  <div class="panel">
    <h2>새 체험단 등록</h2>
    <div class="form-grid">
      <div class="field">
        <label>지역</label>
        <select id="in-region">
          <option value="서울">서울</option>
          <option value="경기">경기</option>
        </select>
      </div>
      <div class="field">
        <label>체험단 이름</label>
        <input id="in-name" placeholder="예: OO 맛집 체험단">
      </div>
      <div class="field">
        <label>제공내역</label>
        <input id="in-provide" placeholder="예: 식사 2인 + 원고료 5만원">
      </div>
      <div class="field">
        <label>주소</label>
        <input id="in-address" placeholder="예: 서울시 강남구 ...">
      </div>
      <div class="field">
        <label>마감일자</label>
        <input id="in-deadline" type="date">
      </div>
      <div class="field">
        <label>상태</label>
        <select id="in-status">
          <option value="wait">예약대기</option>
          <option value="confirm">예약완료</option>
          <option value="done">체험완료</option>
          <option value="end">종료</option>
        </select>
      </div>
      <div class="field">
        <label>플랫폼</label>
        <select id="in-platform">
          <option value="디너의여왕">디너의여왕</option>
          <option value="리뷰노트">리뷰노트</option>
          <option value="놀러와체험단">놀러와체험단</option>
          <option value="레뷰">레뷰</option>
          <option value="데일리뷰">데일리뷰</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <button class="add-btn" onclick="addItem()">+ 추가하기</button>
    </div>
  </div>

  <div class="panel ai-panel">
    <h2>이미지로 자동등록 <span class="ai-badge">AI</span></h2>
    <p class="ai-desc">체험단 초대장/안내 캡처를 올리면 지역·주소·제공내역·플랫폼·마감일자를 자동으로 읽어 채워드려요. 내용을 확인한 뒤 등록하세요.</p>

    <div class="ai-upload-row">
      <label class="ai-upload-btn">
        📷 이미지 선택
        <input type="file" id="ai-image-input" accept="image/*" onchange="onAiImageSelected(event)">
      </label>
      <span id="ai-file-name" class="ai-file-name"></span>
    </div>

    <div id="ai-preview-wrap" class="ai-preview-wrap" style="display:none;">
      <img id="ai-preview-img" class="ai-preview-img">
      <button class="ai-analyze-btn" id="ai-analyze-btn" onclick="analyzeAiImage()">✨ 분석하기</button>
    </div>

    <div id="ai-status" class="ai-status" style="display:none;"></div>

    <div id="ai-result" class="ai-result-grid" style="display:none;">
      <div class="field">
        <label>지역</label>
        <select id="ai-region">
          <option value="서울">서울</option>
          <option value="경기">경기</option>
        </select>
      </div>
      <div class="field">
        <label>체험단 이름</label>
        <input id="ai-name" placeholder="예: OO 맛집 체험단">
      </div>
      <div class="field">
        <label>제공내역</label>
        <input id="ai-provide">
      </div>
      <div class="field">
        <label>주소 (시/군/구 제외)</label>
        <input id="ai-address">
      </div>
      <div class="field">
        <label>마감일자</label>
        <input id="ai-deadline" type="date">
      </div>
      <div class="field">
        <label>플랫폼</label>
        <select id="ai-platform">
          <option value="디너의여왕">디너의여왕</option>
          <option value="리뷰노트">리뷰노트</option>
          <option value="놀러와체험단">놀러와체험단</option>
          <option value="레뷰">레뷰</option>
          <option value="데일리뷰">데일리뷰</option>
          <option value="기타">기타</option>
        </select>
      </div>
      <div class="ai-result-actions">
        <button class="add-btn" onclick="confirmAiAdd()">+ 이 내용으로 등록하기</button>
        <button class="ai-cancel-btn" onclick="resetAiPanel()">취소</button>
      </div>
    </div>
  </div>

  <div class="panel">
    <div class="toolbar">
      <div class="tabs" id="tabs"></div>
      <div class="io-btns">
        <button onclick="exportData()">내보내기(JSON)</button>
        <button onclick="document.getElementById('importFile').click()">가져오기</button>
        <input type="file" id="importFile" accept="application/json" onchange="importData(event)">
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>지역</th>
          <th>체험단 이름</th>
          <th>제공내역</th>
          <th>상태 / 예약일시</th>
          <th>플랫폼</th>
          <th>주소</th>
          <th>마감일자</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="emptyMsg" style="display:none;">등록된 체험단이 없습니다.</div>
  </div>

</div>

<script>
/* ===========================================================
   Apps Script 연동 설정
   =========================================================== */
// ⬇️ 구글 Apps Script 배포 후 발급된 웹앱 URL로 반드시 교체하세요
const API_URL = "https://script.google.com/macros/s/AKfycbzMSBUZ5hBbLR2T-lx7m0G2ODIcXKu7oUqvXbA9iiSL_QtJNcevO_aws-Jb1DhhOImX/exec";

// ⚠️ Apps Script(Code.gs)의 SECRET_KEY와 반드시 동일해야 합니다.
const SITE_KEY = "130702";

let items = [];
let filter = "all";

const statusMeta = {
  wait:    { label:"예약대기",  cls:"status-wait" },
  confirm: { label:"예약완료",  cls:"status-confirm" },
  done:    { label:"체험완료",  cls:"status-done" },
  end:     { label:"종료",      cls:"status-end" }
};

const platformList = ["디너의여왕","리뷰노트","놀러와체험단","레뷰","데일리뷰","기타"];

function platformOptions(selected){
  return platformList.map(p =>
    `<option value="${p}" ${p===selected?'selected':''}>${p}</option>`
  ).join('');
}

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

/* ===========================================================
   AI 이미지 자동등록
   =========================================================== */
let aiImageBase64 = null;
let aiImageMediaType = null;

function onAiImageSelected(e){
  const file = e.target.files[0];
  if(!file) return;
  aiImageMediaType = file.type || "image/png";
  document.getElementById('ai-file-name').textContent = file.name;

  const reader = new FileReader();
  reader.onload = function(evt){
    aiImageBase64 = evt.target.result.split(',')[1];
    document.getElementById('ai-preview-img').src = evt.target.result;
    document.getElementById('ai-preview-wrap').style.display = "flex";
    document.getElementById('ai-result').style.display = "none";
    document.getElementById('ai-status').style.display = "none";
  };
  reader.readAsDataURL(file);
}

async function analyzeAiImage(){
  if(!aiImageBase64){ alert('이미지를 먼저 선택해주세요.'); return; }

  const statusEl = document.getElementById('ai-status');
  const btn = document.getElementById('ai-analyze-btn');
  statusEl.style.display = "block";
  statusEl.textContent = "이미지를 분석하고 있어요...";
  btn.disabled = true;

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        action: "analyzeImage",
        key: SITE_KEY,
        imageBase64: aiImageBase64,
        mediaType: aiImageMediaType
      })
    });
    const data = await res.json();
    if(!data.ok) throw new Error(data.error || "분석 실패");

    const r = data.data || {};
    document.getElementById('ai-region').value = (r.region === "경기") ? "경기" : "서울";
    document.getElementById('ai-name').value = r.name || "";
    document.getElementById('ai-provide').value = r.provide || "";
    document.getElementById('ai-address').value = r.address || "";
    document.getElementById('ai-deadline').value = normalizeDate(r.deadline) || "";
    document.getElementById('ai-platform').value = platformList.includes(r.platform) ? r.platform : "기타";

    document.getElementById('ai-result').style.display = "grid";
    statusEl.style.display = "none";
  } catch(err) {
    statusEl.textContent = "분석 실패: " + err.message + " — 아래 항목을 직접 입력해서 등록할 수 있어요.";
    document.getElementById('ai-result').style.display = "grid";
  } finally {
    btn.disabled = false;
  }
}

async function confirmAiAdd(){
  const name = document.getElementById('ai-name').value.trim();
  if(!name){ alert('체험단 이름을 입력해주세요.'); return; }

  const newItem = {
    id: uid(),
    region: document.getElementById('ai-region').value,
    name,
    provide: document.getElementById('ai-provide').value.trim(),
    address: document.getElementById('ai-address').value.trim(),
    deadline: document.getElementById('ai-deadline').value,
    status: "wait",
    platform: document.getElementById('ai-platform').value,
    resvDate: "", resvTime: ""
  };

  try {
    items = await callApi("add", { item: newItem });
  } catch (err) {
    alert("저장 실패: " + err.message);
    return;
  }

  resetAiPanel();
  render();
}

function resetAiPanel(){
  aiImageBase64 = null;
  aiImageMediaType = null;
  document.getElementById('ai-image-input').value = "";
  document.getElementById('ai-file-name').textContent = "";
  document.getElementById('ai-preview-wrap').style.display = "none";
  document.getElementById('ai-result').style.display = "none";
  document.getElementById('ai-status').style.display = "none";
}

// 서버에서 어떤 형식(Date 객체 문자열, ISO 문자열 등)으로 날짜가 오든
// 항상 "YYYY-MM-DD" 형태로 정리해주는 함수
function normalizeDate(v){
  if(!v) return "";
  const d = new Date(v);
  if(isNaN(d.getTime())) return String(v); // 파싱 안 되면 원본 그대로
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

// 서버(Apps Script)로 POST 요청 보내는 공통 함수
async function callApi(action, payload) {
  const res = await fetch(API_URL, {
    method: "POST",
    headers: { "Content-Type": "text/plain;charset=utf-8" },
    body: JSON.stringify(Object.assign({ action, key: SITE_KEY }, payload))
  });
  const data = await res.json();
  if (!data.ok) throw new Error(data.error || "요청 실패");
  return data.items;
}

async function addItem(){
  const region = document.getElementById('in-region').value;
  const name = document.getElementById('in-name').value.trim();
  const provide = document.getElementById('in-provide').value.trim();
  const address = document.getElementById('in-address').value.trim();
  const deadline = document.getElementById('in-deadline').value;
  const status = document.getElementById('in-status').value;
  const platform = document.getElementById('in-platform').value;

  if(!name){ alert('체험단 이름을 입력해주세요.'); return; }

  const newItem = {
    id: uid(),
    region, name, provide, address, deadline, status, platform,
    resvDate: "", resvTime: ""
  };

  try {
    items = await callApi("add", { item: newItem });
  } catch (err) {
    alert("저장 실패: " + err.message);
    return;
  }

  document.getElementById('in-name').value = "";
  document.getElementById('in-provide').value = "";
  document.getElementById('in-address').value = "";
  document.getElementById('in-deadline').value = "";
  document.getElementById('in-status').value = "wait";
  document.getElementById('in-platform').value = "디너의여왕";

  render();
}

async function deleteItem(id){
  if(!confirm('이 체험단을 삭제할까요?')) return;
  try {
    items = await callApi("delete", { id });
  } catch (err) {
    alert("삭제 실패: " + err.message);
    return;
  }
  render();
}

function setFilter(f){
  filter = f;
  render();
}

function isUrgent(deadline){
  const clean = normalizeDate(deadline);
  if(!clean) return false;
  const d = new Date(clean);
  const today = new Date();
  today.setHours(0,0,0,0);
  const diff = (d - today) / (1000*60*60*24);
  return diff >= 0 && diff <= 3;
}

function render(){
  // summary
  const counts = { wait:0, confirm:0, done:0, end:0 };
  items.forEach(it => counts[it.status]++);
  document.getElementById('summary').innerHTML = `
    <div class="sum-card wait"><div class="num">${counts.wait}</div><div class="lbl">예약대기</div></div>
    <div class="sum-card conf"><div class="num">${counts.confirm}</div><div class="lbl">예약완료</div></div>
    <div class="sum-card done"><div class="num">${counts.done}</div><div class="lbl">체험완료</div></div>
    <div class="sum-card end"><div class="num">${counts.end}</div><div class="lbl">종료</div></div>
  `;

  // tabs
  const tabDefs = [
    {key:"all", label:`전체 (${items.length})`},
    {key:"wait", label:`예약대기 (${counts.wait})`},
    {key:"confirm", label:`예약완료 (${counts.confirm})`},
    {key:"done", label:`체험완료 (${counts.done})`},
    {key:"end", label:`종료 (${counts.end})`}
  ];
  document.getElementById('tabs').innerHTML = tabDefs.map(t =>
    `<button class="tab ${filter===t.key?'active':''}" onclick="setFilter('${t.key}')">${t.label}</button>`
  ).join('');

  // rows
  let list = filter === "all" ? items.slice() : items.filter(it => it.status === filter);
  const statusOrder = { confirm:0, wait:1, done:2, end:3 };
  list.sort((a,b) => {
    const orderDiff = statusOrder[a.status] - statusOrder[b.status];
    if(orderDiff !== 0) return orderDiff;

    if(a.status === "confirm"){
      const aKey = (normalizeDate(a.resvDate) || "9999-99-99") + " " + (a.resvTime || "99:99");
      const bKey = (normalizeDate(b.resvDate) || "9999-99-99") + " " + (b.resvTime || "99:99");
      return aKey.localeCompare(bKey);
    }
    return (normalizeDate(a.deadline) || "9999").localeCompare(normalizeDate(b.deadline) || "9999");
  });

  const tbody = document.getElementById('tbody');
  const emptyMsg = document.getElementById('emptyMsg');

  if(list.length === 0){
    tbody.innerHTML = "";
    emptyMsg.style.display = "block";
    return;
  }
  emptyMsg.style.display = "none";

  tbody.innerHTML = list.map(it => {
    const urgent = it.status === "wait" && isUrgent(it.deadline);
    const resvBlock = it.status === "confirm" ? `
      <input type="date" class="resv-input" value="${normalizeDate(it.resvDate)}"
        onchange="updateResv('${it.id}','resvDate',this.value)">
      <select class="resv-input" onchange="updateResv('${it.id}','resvTime',this.value)">
        <option value="">시간 선택</option>
        ${hourOptions(it.resvTime)}
      </select>
    ` : "";

    return `
      <tr>
        <td data-label="지역"><span class="region-badge">${it.region}</span></td>
        <td data-label="체험단 이름" class="name-cell">${escapeHtml(it.name)}</td>
        <td data-label="제공내역">${escapeHtml(it.provide) || '-'}</td>
        <td data-label="상태">
          <select class="status-select ${statusMeta[it.status].cls}" onchange="updateStatus('${it.id}', this.value)">
            ${Object.keys(statusMeta).map(k =>
              `<option value="${k}" ${k===it.status?'selected':''}>${statusMeta[k].label}</option>`
            ).join('')}
          </select>
          ${resvBlock}
        </td>
        <td data-label="플랫폼">
          <select class="platform-select" onchange="updatePlatform('${it.id}', this.value)">
            ${platformOptions(it.platform)}
          </select>
        </td>
        <td data-label="주소">
          <input class="address-input" value="${escapeHtml(it.address || '')}"
            placeholder="주소 입력"
            onchange="updateAddress('${it.id}', this.value)">
        </td>
        <td data-label="마감일자" class="deadline-cell ${urgent ? 'urgent':''}">${normalizeDate(it.deadline) || '-'}</td>
        <td data-label=""><button class="del-btn" onclick="deleteItem('${it.id}')">✕</button></td>
      </tr>
    `;
  }).join('');
}

function hourOptions(selected){
  let opts = "";
  for(let h = 0; h < 24; h++){
    const value = String(h).padStart(2,'0') + ":00";
    const period = h < 12 ? "오전" : "오후";
    const displayHour = h % 12 === 0 ? 12 : h % 12;
    const label = `${period} ${displayHour}시`;
    opts += `<option value="${value}" ${value===selected?'selected':''}>${label}</option>`;
  }
  return opts;
}

function escapeHtml(str){
  return (str||"").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function exportData(){
  const blob = new Blob([JSON.stringify(items, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `data.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(evt){
    try{
      const data = JSON.parse(evt.target.result);
      if(Array.isArray(data)){
        items = data;
        render();
        alert('불러오기 완료: ' + data.length + '건 (참고: 서버에는 자동 반영되지 않습니다)');
      }
    }catch(err){
      alert('파일을 읽을 수 없습니다. JSON 형식을 확인해주세요.');
    }
  };
  reader.readAsText(file);
  e.target.value = "";
}

async function loadInitialData(){
  try{
    const res = await fetch(`${API_URL}?key=${encodeURIComponent(SITE_KEY)}`, { cache: "no-store" });
    const data = await res.json();
    if (data.ok && Array.isArray(data.items)) items = data.items;
  }catch(e){
    console.error("데이터 로드 실패:", e);
  }
  render();

  // 다른 사람이 시트나 다른 창에서 수정한 내용을 주기적으로 반영 (10초마다)
  setInterval(async () => {
    try {
      const res = await fetch(`${API_URL}?key=${encodeURIComponent(SITE_KEY)}`, { cache: "no-store" });
      const data = await res.json();
      if (data.ok && Array.isArray(data.items)) {
        items = data.items;
        render();
      }
    } catch (e) { /* 조용히 무시 */ }
  }, 10000);
}
loadInitialData();
