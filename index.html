<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>체험단 관리 시스템</title>
    <style>
        :root {
            --primary-color: #2b579a;
            --primary-light: #eef2f7;
            --bg-color: #f4f6f8;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-sub: #586069;
            --border-color: #e1e4e8;
            --radius: 12px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 16px;
            display: flex;
            justify-content: center;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
            padding: 16px;
            border: 1px solid var(--border-color);
        }

        .form-group {
            margin-bottom: 14px;
        }

        .form-group:last-child {
            margin-bottom: 0;
        }

        .form-label {
            display: block;
            font-size: 12px;
            color: var(--text-sub);
            margin-bottom: 6px;
            font-weight: 600;
        }

        .form-input, .form-select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d1d5db;
            border-radius: 6px;
            font-size: 14px;
            background-color: #fff;
            color: var(--text-main);
        }

        /* 1번 수정 요구사항: 날짜와 시간 입력부 레이아웃 깨짐 방지 */
        .datetime-row {
            display: flex;
            gap: 8px;
            width: 100%;
            align-items: center;
        }

        .date-col {
            flex: 1.4;
            min-width: 0;
        }

        .time-col {
            flex: 1;
            min-width: 0;
        }

        /* 캘린더 컴포넌트 스타일 */
        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .calendar-header h2 {
            font-size: 18px;
            color: #111;
        }

        .nav-btn {
            background: #f1f3f5;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            cursor: pointer;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            text-align: center;
            font-size: 13px;
            font-weight: 600;
            color: var(--text-sub);
            margin-bottom: 8px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 6px;
        }

        .calendar-cell {
            position: relative;
            min-height: 65px;
            padding: 6px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: background 0.2s;
        }

        .calendar-cell:active {
            background: #f8f9fa;
        }

        .day-number {
            font-size: 12px;
            font-weight: 500;
        }

        .other-month {
            opacity: 0.3;
        }

        /* 2번 수정 요구사항: 캘린더 칸 내부 뱃지 (클릭 유도형) */
        .event-badge-wrap {
            display: flex;
            align-items: center;
            gap: 3px;
            background: var(--primary-light);
            padding: 2px 5px;
            border-radius: 4px;
            width: fit-content;
        }

        .event-dot {
            width: 5px;
            height: 5px;
            background-color: var(--primary-color);
            border-radius: 50%;
        }

        .event-count {
            font-size: 10px;
            color: var(--primary-color);
            font-weight: 700;
        }

        /* 모달 팝업 스타일 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: #fff;
            width: 85%;
            max-width: 320px;
            padding: 20px;
            border-radius: 14px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 8px;
        }

        .modal-header h3 {
            font-size: 16px;
            color: #111;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 20px;
            cursor: pointer;
            color: #666;
        }

        .modal-body-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            max-height: 220px;
            overflow-y: auto;
        }

        .modal-event-item {
            background: #f8f9fa;
            padding: 10px 12px;
            border-radius: 8px;
            font-size: 13px;
            color: #333;
            border-left: 3px solid var(--primary-color);
            line-height: 1.4;
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- 입력 폼 섹션 (1번 문제 해결 적용) -->
    <div class="card">
        <div class="form-group">
            <label class="form-label">상태</label>
            <select class="form-select">
                <option>예약완료</option>
                <option>예약대기</option>
            </select>
        </div>

        <div class="form-group">
            <div class="datetime-row">
                <div class="date-col">
                    <select class="form-select">
                        <option>2026. 07. 21</option>
                    </select>
                </div>
                <div class="time-col">
                    <select class="form-select">
                        <option>오후 7시</option>
                        <option>오후 8시</option>
                    </select>
                </div>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label">플랫폼</label>
            <input type="text" class="form-input" value="놀러와체험단">
        </div>
        
        <div class="form-group">
            <label class="form-label">주소</label>
            <input type="text" class="form-input" value="화신로272번길 48">
        </div>
    </div>

    <!-- 캘린더 섹션 (2번 문제 해결 적용) -->
    <div class="card">
        <div class="calendar-header">
            <button class="nav-btn">&lt;</button>
            <h2>2026년 7월</h2>
            <button class="nav-btn">&gt;</button>
        </div>

        <div class="weekdays">
            <div>일</div><div>월</div><div>화</div><div>수</div><div>목</div><div>금</div><div>토</div>
        </div>

        <div class="calendar-grid">
            <div class="calendar-cell other-month"><span class="day-number">28</span></div>
            <div class="calendar-cell other-month"><span class="day-number">29</span></div>
            <div class="calendar-cell other-month"><span class="day-number">30</span></div>
            <div class="calendar-cell"><span class="day-number">1</span></div>
            <div class="calendar-cell"><span class="day-number">2</span></div>
            <div class="calendar-cell"><span class="day-number">3</span></div>
            <div class="calendar-cell"><span class="day-number">4</span></div>

            <div class="calendar-cell"><span class="day-number">5</span></div>
            <div class="calendar-cell"><span class="day-number">6</span></div>
            <div class="calendar-cell"><span class="day-number">7</span></div>
            <div class="calendar-cell"><span class="day-number">8</span></div>
            <div class="calendar-cell"><span class="day-number">9</span></div>
            <div class="calendar-cell"><span class="day-number">10</span></div>
            <div class="calendar-cell"><span class="day-number">11</span></div>

            <div class="calendar-cell"><span class="day-number">12</span></div>
            <div class="calendar-cell"><span class="day-number">13</span></div>
            <div class="calendar-cell"><span class="day-number">14</span></div>
            <div class="calendar-cell"><span class="day-number">15</span></div>
            <div class="calendar-cell"><span class="day-number">16</span></div>
            <div class="calendar-cell"><span class="day-number">17</span></div>
            <div class="calendar-cell"><span class="day-number">18</span></div>

            <div class="calendar-cell"><span class="day-number">19</span></div>
            <div class="calendar-cell"><span class="day-number">20</span></div>
            
            <!-- 21일 (일정 1개) -->
            <div class="calendar-cell" onclick="openDateModal('2026년 7월 21일', ['19:00 - [보라]피트니스벨 화정 (예약완료)'])">
                <span class="day-number">21</span>
                <div class="event-badge-wrap">
                    <span class="event-dot"></span>
                    <span class="event-count">1</span>
                </div>
            </div>

            <div class="calendar-cell"><span class="day-number">22</span></div>

            <!-- 23일 (일정 1개) -->
            <div class="calendar-cell" onclick="openDateModal('2026년 7월 23일', ['19:00 - 체험단 일정'])">
                <span class="day-number">23</span>
                <div class="event-badge-wrap">
                    <span class="event-dot"></span>
                    <span class="event-count">1</span>
                </div>
            </div>

            <div class="calendar-cell"><span class="day-number">24</span></div>

            <!-- 25일 (일정 2개) -->
            <div class="calendar-cell" onclick="openDateModal('2026년 7월 25일', ['11:00 - 피트니스벨 화정', '14:00 - 우아든동 체험단'])">
                <span class="day-number">25</span>
                <div class="event-badge-wrap">
                    <span class="event-dot"></span>
                    <span class="event-count">2</span>
                </div>
            </div>

            <!-- 26일 (일정 1개) -->
            <div class="calendar-cell" onclick="openDateModal('2026년 7월 26일', ['14:00 - 마감일정'])">
                <span class="day-number">26</span>
                <div class="event-badge-wrap">
                    <span class="event-dot"></span>
                    <span class="event-count">1</span>
                </div>
            </div>

            <div class="calendar-cell"><span class="day-number">27</span></div>
            <div class="calendar-cell"><span class="day-number">28</span></div>
            <div class="calendar-cell"><span class="day-number">29</span></div>
            <div class="calendar-cell"><span class="day-number">30</span></div>
            <div class="calendar-cell"><span class="day-number">31</span></div>
            <div class="calendar-cell other-month"><span class="day-number">1</span></div>
        </div>
    </div>
</div>

<!-- 상세 일정 모달 팝업 -->
<div id="eventModal" class="modal-overlay" onclick="closeOnOutsideClick(event)">
    <div class="modal-content">
        <div class="modal-header">
            <h3 id="modalDateTitle">날짜 제목</h3>
            <button onclick="closeDateModal()" class="close-btn">&times;</button>
        </div>
        <div id="modalEventList" class="modal-body-list">
            <!-- 자바스크립트로 주입됨 -->
        </div>
    </div>
</div>

<script>
    function openDateModal(dateStr, events) {
        document.getElementById('modalDateTitle').innerText = dateStr;
        const listContainer = document.getElementById('modalEventList');
        listContainer.innerHTML = '';

        if (events && events.length > 0) {
            events.forEach(ev => {
                const item = document.createElement('div');
                item.className = 'modal-event-item';
                item.innerText = ev;
                listContainer.appendChild(item);
            });
        } else {
            listContainer.innerHTML = '<div style="color:#888; font-size:13px; text-align:center; padding:12px;">등록된 일정이 없습니다.</div>';
        }

        document.getElementById('eventModal').style.display = 'flex';
    }

    function closeDateModal() {
        document.getElementById('eventModal').style.display = 'none';
    }

    function closeOnOutsideClick(event) {
        if (event.target.id === 'eventModal') {
            closeDateModal();
        }
    }
</script>

</body>
</html>
