<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KWAN 도구 허브</title>
<style>
  :root{
    --bg:#f6f5f1;
    --ink:#22221f;
    --sub:#6b6a63;
    --line:#e1dfd6;
    --card:#ffffff;
    --accent:#3a5a52;

    --wait-bg:#fdf3d9;   --wait-ink:#8a6d16;
    --conf-bg:#fbe6e3;   --conf-ink:#b3452f;
    --done-bg:#e3ede4;   --done-ink:#2f6b3c;
    --end-bg:#ececea;    --end-ink:#78766e;

    /* 부부 일정 전용 색상 (사람별로 구분) */
    --owner-gwan-bg:#e2eef5;  --owner-gwan-ink:#1f5c82;
    --owner-bora-bg:#fff4c2;  --owner-bora-ink:#b8860b;
    --owner-common-bg:#e3ede4;  --owner-common-ink:#2f6b3c;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    background:var(--bg);
    color:var(--ink);
    padding:48px 20px 80px;
  }
  .wrap{max-width:960px;margin:0 auto;}

  header{margin-bottom:36px;}
  h1{
    font-size:28px;
    letter-spacing:-0.02em;
    margin:0 0 6px;
  }
  header p{
    margin:0;
    color:var(--sub);
    font-size:14px;
  }

  .section-title{
    font-size:13px;
    font-weight:600;
    color:var(--sub);
    margin:0 0 12px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .section-title::before{
    content:"";
    width:6px;height:6px;border-radius:50%;
    background:var(--accent);
    display:inline-block;
  }

  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(230px, 1fr));
    gap:14px;
    margin-bottom:40px;
  }

  .card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:20px;
    text-decoration:none;
    color:var(--ink);
    display:flex;
    flex-direction:column;
    gap:8px;
    transition:transform .12s ease, box-shadow .12s ease;
  }
  .card:hover{
    transform:translateY(-2px);
    box-shadow:0 6px 16px rgba(34,34,31,0.07);
    border-color:var(--accent);
  }
  .card .icon{
    font-size:22px;
    width:42px;height:42px;
    display:flex;align-items:center;justify-content:center;
    background:#eef0ec;
    border-radius:10px;
  }
  .card .title{font-size:15.5px;font-weight:700;}
  .card .desc{font-size:12.5px;color:var(--sub);line-height:1.4;}

  .card.empty{
    border-style:dashed;
    align-items:center;
    justify-content:center;
    color:var(--sub);
    font-size:13px;
    text-align:center;
    min-height:110px;
  }

  footer{
    margin-top:30px;
    font-size:12px;
    color:var(--sub);
    border-top:1px solid var(--line);
    padding-top:16px;
  }
  footer code{
    background:#eeece5;
    padding:1px 5px;
    border-radius:4px;
  }
  #appContent{display:block;}

  /* ---- 캘린더 ---- */
  .cal-panel{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:20px;
  }
  .cal-header{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:18px;
    margin-bottom:14px;
    position:relative;
  }
  .cal-nav-btn{
    border:1px solid var(--line);
    background:#fff;
    color:var(--sub);
    width:30px;height:30px;
    border-radius:8px;
    cursor:pointer;
    font-size:15px;
    line-height:1;
  }
  .cal-nav-btn:hover{border-color:var(--accent);color:var(--accent);}
  .cal-title{font-size:15.5px;font-weight:700;min-width:110px;text-align:center;}

  .cal-add-couple-btn{
    position:absolute;
    right:0;
    top:50%;
    transform:translateY(-50%);
    border:1px solid var(--accent);
    background:#fff;
    color:var(--accent);
    padding:6px 12px;
    border-radius:20px;
    font-size:12px;
    font-weight:600;
    cursor:pointer;
    white-space:nowrap;
  }
  .cal-add-couple-btn:hover{background:var(--accent);color:#fff;}

  .cal-legend{
    display:flex;
    gap:14px;
    flex-wrap:wrap;
    justify-content:center;
    margin-bottom:16px;
    font-size:12px;
    color:var(--sub);
  }
  .cal-legend span{display:flex;align-items:center;gap:5px;}
  .cal-legend .dot{width:8px;height:8px;border-radius:50%;display:inline-block;}
  .dot.wait{background:var(--wait-ink);}
  .dot.confirm{background:var(--conf-ink);}
  .dot.done{background:var(--done-ink);}
  .dot.end{background:var(--end-ink);}
  .dot.owner-gwan{background:var(--owner-gwan-ink);}
  .dot.owner-bora{background:var(--owner-bora-ink);}
  .dot.owner-common{background:var(--owner-common-ink);}

  .cal-grid-wrap{
    position:relative;
  }
  .cal-grid{
    display:grid;
    grid-template-columns:repeat(7,1fr);
    gap:6px;
  }
  .cal-bars-layer{
    position:absolute;
    top:0;left:0;right:0;bottom:0;
    pointer-events:none;
  }
  .cal-bar-slot{
    height:17px;
    flex-shrink:0;
  }
  .cal-bar{
    position:absolute;
    box-sizing:border-box;
    display:flex;
    align-items:center;
    font-size:10.5px;
    font-weight:600;
    padding:2px 6px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    cursor:pointer;
    pointer-events:auto;
  }
  .cal-bar:hover{filter:brightness(0.95);}
  .cal-bar.round-left{border-top-left-radius:5px;border-bottom-left-radius:5px;}
  .cal-bar.round-right{border-top-right-radius:5px;border-bottom-right-radius:5px;}
  .cal-bar.owner-gwan{background:var(--owner-gwan-bg);color:var(--owner-gwan-ink);}
  .cal-bar.owner-bora{background:var(--owner-bora-bg);color:var(--owner-bora-ink);}
  .cal-bar.owner-common{background:var(--owner-common-bg);color:var(--owner-common-ink);}
  .cal-dow{
    text-align:center;
    font-size:11.5px;
    color:var(--sub);
    padding-bottom:6px;
    font-weight:600;
  }
  .cal-cell{
    min-height:82px;
    border:1px solid var(--line);
    border-radius:8px;
    padding:6px 6px;
    background:#fdfcfa;
    display:flex;
    flex-direction:column;
    gap:3px;
    overflow:hidden;
  }
  .cal-cell.other-month{background:transparent;border-color:transparent;}
  .cal-cell.today{border-color:var(--accent);}
  .cal-daynum{font-size:11.5px;color:var(--sub);}
  .cal-cell.today .cal-daynum{color:var(--accent);font-weight:700;}
  .cal-event{
    font-size:10.5px;
    padding:2px 5px;
    border-radius:4px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    cursor:pointer;
  }
  .cal-event:hover{filter:brightness(0.95);}
  .cal-event.wait{background:var(--wait-bg);color:var(--wait-ink);}
  .cal-event.confirm{background:var(--conf-bg);color:var(--conf-ink);}
  .cal-event.done{background:var(--done-bg);color:var(--done-ink);}
  .cal-event.end{background:var(--end-bg);color:var(--end-ink);}
  .cal-event.owner-gwan{background:var(--owner-gwan-bg);color:var(--owner-gwan-ink);font-weight:600;}
  .cal-event.owner-bora{background:var(--owner-bora-bg);color:var(--owner-bora-ink);font-weight:600;}
  .cal-event.owner-common{background:var(--owner-common-bg);color:var(--owner-common-ink);font-weight:600;}
  .cal-event-time{font-weight:700;margin-right:3px;}
  .cal-empty-msg{
    text-align:center;
    padding:30px 0;
    color:var(--sub);
    font-size:13px;
  }

  /* ---- 이벤트 상세 팝업 (공통) ---- */
  .cal-modal-overlay{
    position:fixed;inset:0;
    background:rgba(34,34,31,0.45);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:9998;
    padding:20px;
  }
  .cal-modal-overlay.open{display:flex;}
  /* 부부 일정 로그인 게이트: 다른 팝업과 달리 뒤 배경이 전혀 비치지 않는 완전 단독 화면 */
  #coupleLoginOverlay{
    background:var(--bg);
    z-index:10000;
  }
  .cal-modal{
    background:var(--card);
    border-radius:14px;
    max-width:360px;
    width:100%;
    padding:24px;
    position:relative;
    box-shadow:0 12px 32px rgba(0,0,0,0.15);
  }
  .cal-modal-close{
    position:absolute;
    top:14px;right:16px;
    background:none;
    border:none;
    font-size:18px;
    color:var(--sub);
    cursor:pointer;
    line-height:1;
  }
  .cal-modal-close:hover{color:var(--ink);}
  .cal-modal-title{
    font-size:17px;
    font-weight:700;
    margin:0 0 4px;
    padding-right:20px;
  }
  .cal-modal-badge{
    display:inline-block;
    font-size:11.5px;
    font-weight:600;
    padding:3px 9px;
    border-radius:20px;
    margin-bottom:14px;
  }
  .cal-modal-row{
    display:flex;
    justify-content:space-between;
    gap:12px;
    padding:8px 0;
    border-top:1px solid var(--line);
    font-size:13px;
  }
  .cal-modal-row .k{color:var(--sub);flex-shrink:0;}
  .cal-modal-row .v{text-align:right;word-break:break-all;}
  .cal-modal-del-btn{
    margin-top:16px;
    width:100%;
    background:none;
    border:1px solid var(--line);
    color:var(--sub);
    padding:9px 0;
    border-radius:8px;
    font-size:13px;
    cursor:pointer;
  }
  .cal-modal-del-btn:hover{border-color:#b3452f;color:#b3452f;}

  /* ---- 부부 일정 추가 폼 ---- */
  .couple-field{margin-bottom:12px;}
  .couple-field label{
    display:block;
    font-size:12px;
    color:var(--sub);
    margin-bottom:5px;
  }
  .couple-field input, .couple-field textarea{
    width:100%;
    padding:9px 10px;
    border:1px solid var(--line);
    border-radius:7px;
    font-size:13.5px;
    background:#fff;
    color:var(--ink);
    font-family:inherit;
  }
  .couple-field textarea{resize:vertical;min-height:60px;}
  .couple-field input:focus, .couple-field textarea:focus{
    outline:none;
    border-color:var(--accent);
  }
  .owner-toggle{
    display:flex;
    border:1px solid var(--line);
    border-radius:8px;
    overflow:hidden;
    margin-bottom:16px;
  }
  .owner-toggle button{
    flex:1;
    border:none;
    background:#fff;
    padding:9px 0;
    font-size:13px;
    font-weight:600;
    color:var(--sub);
    cursor:pointer;
  }
  .owner-toggle button + button{border-left:1px solid var(--line);}
  .owner-toggle button.active[data-owner="관"]{background:var(--owner-gwan-bg);color:var(--owner-gwan-ink);}
  .owner-toggle button.active[data-owner="보라"]{background:var(--owner-bora-bg);color:var(--owner-bora-ink);}
  .owner-toggle button.active[data-owner="공통"]{background:var(--owner-common-bg);color:var(--owner-common-ink);}
  .couple-save-btn{
    margin-top:4px;
    width:100%;
    background:var(--accent);
    color:#fff;
    border:none;
    padding:10px 0;
    border-radius:8px;
    font-size:13.5px;
    font-weight:600;
    cursor:pointer;
  }
  .couple-save-btn:hover{opacity:0.9;}
  .couple-save-btn:disabled{opacity:0.5;cursor:not-allowed;}
  .couple-status-msg{
    font-size:11.5px;
    color:var(--sub);
    margin-top:8px;
    text-align:center;
  }

  /* 📱 모바일 화면 최적화 (640px 이하) */
  @media (max-width:640px){
    body{padding:24px 14px 60px;}
    .grid{grid-template-columns:1fr;}
    .cal-panel{padding:14px 10px;}
    .cal-cell{min-height:64px;padding:4px 3px;gap:2px;}
    .cal-daynum{font-size:10.5px;}
    .cal-event{font-size:9px;padding:1px 3px;}
    .cal-bar-slot{height:13px;}
    .cal-bar{font-size:9px;padding:1px 4px;}
    .cal-add-couple-btn{
      position:static;
      transform:none;
      display:block;
      margin:10px auto 0;
    }
    .cal-header{flex-wrap:wrap;}
  }
</style>
</head>
<body>
<div class="wrap" id="appContent">

  <header>
    <h1>KWAN 도구 허브</h1>
    <p>업무·개인용 도구 모음. 필요할 때 하나씩 열어서 씁니다.</p>
  </header>

  <div class="section-title">체험단 / 콘텐츠</div>
  <div class="grid">
    <a class="card" href="./review.html">
      <div class="icon">📋</div>
      <div class="title">Blog</div>
      <div class="desc">지역·제공내역·마감일·상태·예약일시·플랫폼까지 한 번에 관리</div>
    </a>

    <a class="card" href="./task.html">
      <div class="icon">✅</div>
      <div class="title">Task</div>
      <div class="desc">노션 개인 페이지 연동 (할 일 관리)</div>
    </a>

    <div class="card empty">+ 다음 도구 추가 예정</div>
  </div>

  <div class="section-title">가계부</div>
  <div class="grid">
    <a class="card" href="./ledger.html">
      <div class="icon">💰</div>
      <div class="title">가계부</div>
      <div class="desc">수입·지출·저축·투자를 월별로 기록하고 관리</div>
    </a>
  </div>

  <div class="section-title">체험단 캘린더</div>
  <div class="cal-panel">
    <div class="cal-header">
      <button class="cal-nav-btn" onclick="calChangeMonth(-1)">‹</button>
      <div class="cal-title" id="calTitle"></div>
      <button class="cal-nav-btn" onclick="calChangeMonth(1)">›</button>
      <button class="cal-add-couple-btn" onclick="coupleOpenAdd()">+ 일정 추가</button>
      <button class="cal-nav-btn" id="coupleLogoutBtn" style="display:none;position:absolute;right:110px;top:50%;transform:translateY(-50%);width:auto;padding:0 10px;font-size:11px;" onclick="coupleLogout()" title="로그아웃">로그아웃</button>
    </div>
    <div class="cal-legend">
      <span><i class="dot confirm"></i>예약완료(체험단)</span>
      <span><i class="dot owner-gwan"></i>관</span>
      <span><i class="dot owner-bora"></i>보라</span>
      <span><i class="dot owner-common"></i>공통</span>
    </div>
    <div class="cal-grid-wrap">
      <div class="cal-grid" id="calGrid"></div>
      <div class="cal-bars-layer" id="calBarsLayer"></div>
    </div>
  </div>

  <!-- 이벤트 상세 팝업 (체험단 / 부부 일정 공용) -->
  <div class="cal-modal-overlay" id="calModalOverlay" onclick="if(event.target===this) calCloseDetail()">
    <div class="cal-modal">
      <button class="cal-modal-close" onclick="calCloseDetail()">✕</button>
      <div id="calModalBody"></div>
    </div>
  </div>

  <!-- 부부 일정 로그인 팝업 (아이디+비밀번호) -->
  <div class="cal-modal-overlay open" id="coupleLoginOverlay">
    <div class="cal-modal">
      <div class="cal-modal-title" style="margin-bottom:6px;">일정 로그인</div>
      <p style="font-size:12.5px;color:var(--sub);margin:0 0 16px;">부부 일정을 보고 수정하려면 로그인이 필요합니다.</p>
      <div class="couple-field">
        <label>아이디</label>
        <input type="text" id="coupleLoginId" placeholder="아이디 입력" autocomplete="username">
      </div>
      <div class="couple-field">
        <label>비밀번호</label>
        <input type="password" id="coupleLoginPw" placeholder="비밀번호" autocomplete="current-password" onkeydown="if(event.key==='Enter') coupleLoginWithPassword()">
      </div>
      <button class="couple-save-btn" onclick="coupleLoginWithPassword()">로그인</button>
      <div class="couple-status-msg" id="coupleLoginMsg"></div>
    </div>
  </div>

  <!-- 부부 일정 추가 팝업 -->
  <div class="cal-modal-overlay" id="coupleAddOverlay" onclick="if(event.target===this) coupleCloseAdd()">
    <div class="cal-modal">
      <button class="cal-modal-close" onclick="coupleCloseAdd()">✕</button>
      <div class="cal-modal-title" id="coupleModalTitle" style="margin-bottom:16px;">일정 추가</div>
      <div class="owner-toggle" id="ownerToggle">
        <button type="button" data-owner="관" onclick="coupleSelectOwner('관')">관</button>
        <button type="button" data-owner="보라" onclick="coupleSelectOwner('보라')">보라</button>
        <button type="button" data-owner="공통" onclick="coupleSelectOwner('공통')">공통</button>
      </div>
      <div class="couple-field">
        <label>제목</label>
        <input type="text" id="couple-in-title" placeholder="예: 결혼기념일 저녁 예약">
      </div>
      <div class="couple-field">
        <label>시작일</label>
        <input type="date" id="couple-in-date">
      </div>
      <div class="couple-field">
        <label>종료일 (선택 — 여러 날에 걸친 일정일 때만)</label>
        <input type="date" id="couple-in-endDate">
      </div>
      <div class="couple-field">
        <label>시작 시간 (선택)</label>
        <input type="time" id="couple-in-time">
      </div>
      <div class="couple-field">
        <label>종료 시간 (선택)</label>
        <input type="time" id="couple-in-endTime">
      </div>
      <div class="couple-field">
        <label>메모 (선택)</label>
        <textarea id="couple-in-memo" placeholder="장소, 준비물 등"></textarea>
      </div>
      <button class="couple-save-btn" id="coupleSaveBtn" onclick="coupleAddEvent()">저장</button>
      <button class="cal-modal-del-btn" id="coupleModalDelBtn" style="display:none;" onclick="coupleDeleteEvent(coupleEditId)">삭제</button>
      <div class="couple-status-msg" id="coupleStatusMsg"></div>
    </div>
  </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ===========================================================
   체험단 캘린더 + 부부 일정(events) 데이터: 둘 다 Apps Script(구글 시트) 사용.
   로그인만 Supabase Auth 유지 (부부 일정을 보고 수정하려면 로그인 필요).
   =========================================================== */
const CAL_API_URL = "https://script.google.com/macros/s/AKfycbzMSBUZ5hBbLR2T-lx7m0G2ODIcXKu7oUqvXbA9iiSL_QtJNcevO_aws-Jb1DhhOImX/exec";
// ⚠️ Apps Script(Code.gs)의 SECRET_KEY와 반드시 동일해야 함.
const CAL_SITE_KEY = "130702";

/* ⚠️ 아래 두 값을 본인 Supabase 프로젝트 값으로 교체하세요.
   Supabase 대시보드 → Project Settings → API 에서 확인 가능합니다. */
const SUPABASE_URL = "https://YOUR-PROJECT-REF.supabase.co";
const SUPABASE_ANON_KEY = "YOUR-ANON-PUBLIC-KEY";
// 로그인 세션을 localStorage 대신 sessionStorage에 저장 → 브라우저(탭)를 닫으면 자동 로그아웃됩니다.
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
  auth: { storage: window.sessionStorage, persistSession: true, autoRefreshToken: true }
});

let calItems = [];       // 체험단 항목 (Apps Script, resource=blog)
let coupleItems = [];    // 부부 일정 항목 (Apps Script, resource=events)
let coupleEditId = null; // 수정 중인 부부 일정 id (null이면 신규 추가 모드)
let coupleSelectedOwner = "관";
let coupleLoggedIn = false; // Supabase 로그인 상태
let calCursor = new Date();
calCursor.setDate(1);

const calStatusLabel = { wait:"예약대기", confirm:"예약완료", done:"체험완료", end:"종료" };

function calNormalizeDate(v){
  if(!v) return "";
  const d = new Date(v);
  if(isNaN(d.getTime())) return "";
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}-${m}-${day}`;
}

// 시작일~종료일을 하루 단위 날짜 문자열 배열로 펼침 (여러 날에 걸친 부부 일정용)
function calDateRange(start, end){
  const startStr = calNormalizeDate(start);
  if(!startStr) return [];
  const endStr = calNormalizeDate(end) || startStr;

  const startD = new Date(startStr + "T00:00:00");
  const endD = new Date(endStr + "T00:00:00");
  if(isNaN(endD.getTime()) || endD < startD) return [startStr];

  const dates = [];
  let cur = new Date(startD);
  // 안전장치: 과도하게 긴 범위 방지 (최대 60일)
  let guard = 0;
  while(cur <= endD && guard < 60){
    dates.push(calNormalizeDate(cur));
    cur.setDate(cur.getDate() + 1);
    guard++;
  }
  return dates;
}

function calEscapeHtml(str){
  return (str||"").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

/* ---- Apps Script "events" 시트 row <-> 프론트 item (필드명이 이미 동일, endDate/endTime 없으면 빈 값으로) ---- */
function coupleRowToItem(row){
  return {
    id: row.id,
    title: row.title || "",
    date: row.date || "",
    endDate: row.endDate || "",
    time: row.time || "",
    endTime: row.endTime || "",
    memo: row.memo || "",
    owner: row.owner || "관",
    createdAt: row.createdAt || ""
  };
}
function coupleItemToRow(item){
  return {
    id: item.id,
    title: item.title,
    date: item.date,
    endDate: item.endDate || "",
    time: item.time || "",
    endTime: item.endTime || "",
    memo: item.memo || "",
    owner: item.owner,
    createdAt: item.createdAt
  };
}

/* ---- 체험단(기존): 예약완료(confirm) 상태만 예약일자 기준으로 표시 ---- */
function calEventDate(it){
  if(it.status !== "confirm" || !it.resvDate) return "";
  return calNormalizeDate(it.resvDate);
}

function calChangeMonth(delta){
  calCursor.setMonth(calCursor.getMonth() + delta);
  calRender();
}

function coupleOwnerClass(it){
  return it.owner === '보라' ? 'owner-bora' : (it.owner === '공통' ? 'owner-common' : 'owner-gwan');
}

function coupleTimeLabel(it, isGlobalStart, isGlobalEnd){
  // 시작일 세그먼트에는 시작(~종료)시간을, 종료일에만 존재하는 종료시간은 함께 표기
  const parts = [];
  if(isGlobalStart && it.time) parts.push(calEscapeHtml(it.time));
  if(isGlobalEnd && it.endTime) parts.push(calEscapeHtml(it.endTime));
  return parts.join('~');
}

let calCurrentSegments = []; // 현재 렌더링된 다일 일정 바 세그먼트 (리사이즈 시 재측정용)

function calRender(){
  const y = calCursor.getFullYear();
  const m = calCursor.getMonth(); // 0-11
  document.getElementById('calTitle').textContent = `${y}년 ${m+1}월`;

  // 이 달의 "단일 날짜" 항목들을 날짜별로 묶기 (체험단 + 부부 단일일정 병합)
  const byDate = {};
  // 행(row)별 다일 일정 세그먼트 목록
  const rowSegments = {}; // rowIndex -> [{it, startCol, endCol, isGlobalStart, isGlobalEnd, lane}]

  calItems.forEach(it => {
    const dateStr = calEventDate(it);
    if(!dateStr) return;
    const [ey, em] = dateStr.split('-').map(Number);
    if(ey === y && em === m+1){
      (byDate[dateStr] = byDate[dateStr] || []).push({ kind:'campaign', data: it });
    }
  });

  const globalStartStr = {}; // it.id -> 전체 일정의 시작일 문자열
  const globalEndStr = {};   // it.id -> 전체 일정의 종료일 문자열

  coupleItems.forEach(it => {
    const dates = calDateRange(it.date, it.endDate);
    if(dates.length === 0) return;
    globalStartStr[it.id] = dates[0];
    globalEndStr[it.id] = dates[dates.length-1];

    if(dates.length === 1){
      const dateStr = dates[0];
      const [ey, em] = dateStr.split('-').map(Number);
      if(ey === y && em === m+1){
        (byDate[dateStr] = byDate[dateStr] || []).push({ kind:'couple', data: it, isRange:false });
      }
      return;
    }

    // 다일 일정: 이 달에 걸치는 날짜만 남기고, 같은 주(row)끼리 묶어 세그먼트 생성
    const inMonthDates = dates.filter(dateStr => {
      const [ey, em] = dateStr.split('-').map(Number);
      return ey === y && em === m+1;
    });
    if(inMonthDates.length === 0) return;

    let seg = null;
    inMonthDates.forEach(dateStr => {
      const rc = calDateRowCol(dateStr, y, m);
      if(!rc) return;
      if(seg && seg.row === rc.row && seg.endCol === rc.col - 1){
        seg.endCol = rc.col;
        seg.dates.push(dateStr);
      } else {
        if(seg) (rowSegments[seg.row] = rowSegments[seg.row] || []).push(seg);
        seg = { it, row: rc.row, startCol: rc.col, endCol: rc.col, dates:[dateStr] };
      }
    });
    if(seg) (rowSegments[seg.row] = rowSegments[seg.row] || []).push(seg);
  });

  // 세그먼트에 전역 시작/종료 여부 및 lane(겹칠 때 쌓을 위치) 부여
  Object.keys(rowSegments).forEach(rowKey => {
    const segs = rowSegments[rowKey];
    segs.forEach(seg => {
      seg.isGlobalStart = seg.dates[0] === globalStartStr[seg.it.id];
      seg.isGlobalEnd = seg.dates[seg.dates.length-1] === globalEndStr[seg.it.id];
    });
    segs.sort((a,b) => a.startCol - b.startCol || a.endCol - b.endCol);
    const laneEndCol = [];
    segs.forEach(seg => {
      let lane = laneEndCol.findIndex(endCol => endCol < seg.startCol);
      if(lane === -1){ lane = laneEndCol.length; laneEndCol.push(seg.endCol); }
      else { laneEndCol[lane] = seg.endCol; }
      seg.lane = lane;
    });
  });

  const first = new Date(y, m, 1);
  const startOffset = first.getDay(); // 0=일요일
  const daysInMonth = new Date(y, m+1, 0).getDate();
  const daysInPrevMonth = new Date(y, m, 0).getDate();

  const todayStr = calNormalizeDate(new Date());

  const cells = [];
  const dowLabels = ['일','월','화','수','목','금','토'];
  dowLabels.forEach(l => cells.push(`<div class="cal-dow">${l}</div>`));

  // 이전 달 채우기
  for(let i = startOffset - 1; i >= 0; i--){
    cells.push(`<div class="cal-cell other-month"><div class="cal-daynum">${daysInPrevMonth - i}</div></div>`);
  }

  // 열(col)별로, 해당 행에서 사용된 세그먼트를 lane 순서대로 정리 (빈 lane은 공백 슬롯으로 채워 정렬 유지)
  function slotsHtmlForCol(row, col){
    const segs = (rowSegments[row] || []).filter(s => col >= s.startCol && col <= s.endCol);
    if(segs.length === 0) return '';
    const maxLane = Math.max(...segs.map(s => s.lane));
    let html = '';
    for(let lane = 0; lane <= maxLane; lane++){
      const seg = segs.find(s => s.lane === lane);
      if(seg){
        const segId = `${seg.it.id}_r${row}`;
        html += `<div class="cal-bar-slot" data-seg="${segId}"></div>`;
      } else {
        html += `<div class="cal-bar-slot" data-seg="blank"></div>`;
      }
    }
    return html;
  }

  // 이번 달
  for(let d = 1; d <= daysInMonth; d++){
    const dateStr = `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr === todayStr;
    const rc = calDateRowCol(dateStr, y, m);
    const dayEntries = (byDate[dateStr] || []).slice().sort((a,b) => {
      const ta = a.kind === 'campaign' ? (a.data.resvTime||"") : (a.data.time||"");
      const tb = b.kind === 'campaign' ? (b.data.resvTime||"") : (b.data.time||"");
      return ta.localeCompare(tb);
    });

    const eventsHtml = dayEntries.map(entry => {
      if(entry.kind === 'campaign'){
        const it = entry.data;
        const timeLabel = it.resvTime ? `${calEscapeHtml(it.resvTime)} ` : '';
        return `<div class="cal-event ${it.status}" onclick="calShowDetail('${it.id}','campaign')" title="${timeLabel}${calEscapeHtml(it.name)} (${calStatusLabel[it.status]||''})"><span class="cal-event-time">${timeLabel}</span>${calEscapeHtml(it.name)}</div>`;
      } else {
        const it = entry.data;
        let timeLabel = it.time ? calEscapeHtml(it.time) : '';
        if(it.endTime) timeLabel = timeLabel ? `${timeLabel}~${calEscapeHtml(it.endTime)}` : calEscapeHtml(it.endTime);
        if(timeLabel) timeLabel += ' ';
        const ownerClass = coupleOwnerClass(it);
        return `<div class="cal-event ${ownerClass}" onclick="calShowDetail('${it.id}','couple')" title="${timeLabel}${calEscapeHtml(it.title)} (${calEscapeHtml(it.owner||'관')})"><span class="cal-event-time">${timeLabel}</span>${calEscapeHtml(it.title)}</div>`;
      }
    }).join('');

    const slotsHtml = rc ? slotsHtmlForCol(rc.row, rc.col) : '';
    cells.push(`<div class="cal-cell ${isToday?'today':''}"><div class="cal-daynum">${d}</div>${slotsHtml}${eventsHtml}</div>`);
  }

  // 다음 달 채우기 (7의 배수로 맞춤)
  const totalSoFar = startOffset + daysInMonth;
  const trailing = (7 - (totalSoFar % 7)) % 7;
  for(let d = 1; d <= trailing; d++){
    cells.push(`<div class="cal-cell other-month"><div class="cal-daynum">${d}</div></div>`);
  }

  document.getElementById('calGrid').innerHTML = cells.join('');

  // 렌더링용 세그먼트 평탄화 후 바(연속 블록) 배치
  calCurrentSegments = [];
  Object.keys(rowSegments).forEach(rowKey => {
    rowSegments[rowKey].forEach(seg => calCurrentSegments.push(seg));
  });
  calPositionBars();
}

// 날짜 문자열이 현재 달력 그리드에서 몇 번째 행/열에 위치하는지 계산 (0=일요일 시작)
function calDateRowCol(dateStr, y, m){
  const [ey, em, ed] = dateStr.split('-').map(Number);
  if(ey !== y || em !== m+1) return null;
  const first = new Date(y, m, 1);
  const startOffset = first.getDay();
  const idx = startOffset + (ed - 1); // 헤더(dow) 행 제외, 0부터 시작하는 셀 인덱스
  return { row: Math.floor(idx / 7), col: idx % 7 };
}

// 측정된 슬롯 위치를 바탕으로 연속된 다일 일정 바를 그린다
function calPositionBars(){
  const layer = document.getElementById('calBarsLayer');
  const wrap = layer.parentElement;
  if(!layer || !wrap) return;
  const wrapRect = wrap.getBoundingClientRect();

  const html = calCurrentSegments.map(seg => {
    const segId = `${seg.it.id}_r${seg.row}`;
    const els = Array.from(document.querySelectorAll(`[data-seg="${segId}"]`));
    if(els.length === 0) return '';
    let left = Infinity, right = -Infinity, top = Infinity, bottom = -Infinity;
    els.forEach(el => {
      const r = el.getBoundingClientRect();
      left = Math.min(left, r.left);
      right = Math.max(right, r.right);
      top = Math.min(top, r.top);
      bottom = Math.max(bottom, r.bottom);
    });
    const it = seg.it;
    const ownerClass = coupleOwnerClass(it);
    const roundClass = (seg.isGlobalStart ? 'round-left ' : '') + (seg.isGlobalEnd ? 'round-right' : '');
    const label = coupleTimeLabel(it, seg.isGlobalStart, seg.isGlobalEnd);
    const text = (label ? label + ' ' : '') + calEscapeHtml(it.title);
    const style = `left:${left - wrapRect.left}px; top:${top - wrapRect.top}px; width:${right-left}px; height:${bottom-top}px;`;
    const titleAttr = `${it.time?calEscapeHtml(it.time):''}${it.endTime?('~'+calEscapeHtml(it.endTime)):''} ${calEscapeHtml(it.title)} (${calEscapeHtml(it.owner||'관')})`;
    return `<div class="cal-bar ${ownerClass} ${roundClass}" style="${style}" onclick="calShowDetail('${it.id}','couple')" title="${titleAttr}">${text}</div>`;
  }).join('');

  layer.innerHTML = html;
}

let calResizeTimer = null;
window.addEventListener('resize', () => {
  clearTimeout(calResizeTimer);
  calResizeTimer = setTimeout(calPositionBars, 150);
});

/* ---- 체험단 데이터 로드 (기존 그대로, key만 전달하는 GET) ---- */
async function calLoad(){
  try{
    const res = await fetch(`${CAL_API_URL}?key=${encodeURIComponent(CAL_SITE_KEY)}`, { cache: "no-store" });
    const data = await res.json();
    if(data.ok && Array.isArray(data.items)) calItems = data.items;
  }catch(e){
    console.error("체험단 캘린더 데이터 로드 실패:", e);
  }
  calRender();
}

/* ---- 부부 일정 데이터 로드 (Apps Script, resource=events) ---- */
async function coupleLoad(){
  if(!coupleLoggedIn) return;
  try{
    const res = await fetch(`${CAL_API_URL}?key=${encodeURIComponent(CAL_SITE_KEY)}&resource=events`, { cache: "no-store" });
    const data = await res.json();
    if(!data.ok) throw new Error(data.error);
    coupleItems = (data.items || [])
      .map(coupleRowToItem)
      .sort((a, b) => (a.date || "").localeCompare(b.date || ""));
  }catch(e){
    console.error("부부 일정 데이터 로드 실패:", e);
  }
  calRender();
}

/* ---- Supabase 로그인 상태 확인 및 부부 일정 로그인 게이트 ---- */
function coupleShowLogin(){
  document.getElementById('coupleLoginOverlay').classList.add('open');
}
function coupleHideLogin(){
  document.getElementById('coupleLoginOverlay').classList.remove('open');
}
/* 아이디(kwan/bora)를 내부용 가짜 이메일로 변환 (Supabase Auth는 이메일 기반) */
const COUPLE_EMAIL_DOMAIN = "internal.local";
function coupleIdToEmail(id){
  return `${id.trim().toLowerCase()}@${COUPLE_EMAIL_DOMAIN}`;
}
async function coupleLoginWithPassword(){
  const id = document.getElementById('coupleLoginId').value.trim();
  const pw = document.getElementById('coupleLoginPw').value;
  const msg = document.getElementById('coupleLoginMsg');
  if(!id || !pw){ alert('아이디와 비밀번호를 입력해주세요.'); return; }
  msg.textContent = "로그인 중...";
  const { error } = await sb.auth.signInWithPassword({
    email: coupleIdToEmail(id),
    password: pw
  });
  if(error){ msg.textContent = "로그인 실패: 아이디 또는 비밀번호를 확인해주세요."; return; }
  msg.textContent = "";
}
async function coupleLogout(){
  await sb.auth.signOut();
  coupleLoggedIn = false;
  coupleItems = [];
  document.getElementById('coupleLogoutBtn').style.display = 'none';
  calRender();
  coupleShowLogin();
}

async function coupleInitAuth(){
  const { data: { session } } = await sb.auth.getSession();
  if(session){
    coupleLoggedIn = true;
    coupleHideLogin();
    document.getElementById('coupleLogoutBtn').style.display = 'inline-block';
    await coupleLoad();
  } else {
    coupleLoggedIn = false;
    coupleShowLogin();
  }
  sb.auth.onAuthStateChange(async (event, session) => {
    if(session){
      coupleLoggedIn = true;
      coupleHideLogin();
      document.getElementById('coupleLogoutBtn').style.display = 'inline-block';
      await coupleLoad();
    } else {
      coupleLoggedIn = false;
      document.getElementById('coupleLogoutBtn').style.display = 'none';
      coupleItems = [];
      calRender();
    }
  });
}

calLoad();
setInterval(calLoad, 30000);
coupleInitAuth();
setInterval(() => { if(coupleLoggedIn) coupleLoad(); }, 30000);

// ---- 이벤트 상세 팝업 (체험단 + 부부 일정 공용) ----
const calFieldLabels = {
  region: "지역",
  provide: "제공내역",
  address: "주소",
  contact: "예약문의",
  deadline: "마감일자",
  platform: "플랫폼",
  resvDate: "예약일",
  resvTime: "예약시간"
};

function calShowDetail(id, kind){
  if(kind === 'couple'){
    coupleOpenEdit(id);
    return;
  }

  // 체험단(기존 로직 그대로)
  const it = calItems.find(i => i.id === id);
  if(!it) return;

  const rows = Object.keys(calFieldLabels)
    .filter(key => it[key])
    .map(key => `
      <div class="cal-modal-row">
        <span class="k">${calFieldLabels[key]}</span>
        <span class="v">${calEscapeHtml(it[key])}</span>
      </div>
    `).join('');

  document.getElementById('calModalBody').innerHTML = `
    <div class="cal-modal-title">${calEscapeHtml(it.name)}</div>
    <div class="cal-modal-badge status-badge-${it.status}" style="background:var(--${it.status}-bg);color:var(--${it.status}-ink);">
      ${calStatusLabel[it.status] || it.status}
    </div>
    ${rows}
  `;
  document.getElementById('calModalOverlay').classList.add('open');
}

function calCloseDetail(){
  document.getElementById('calModalOverlay').classList.remove('open');
}

async function coupleAddEvent(){
  const title = document.getElementById('couple-in-title').value.trim();
  const date = document.getElementById('couple-in-date').value;
  const endDate = document.getElementById('couple-in-endDate').value;
  const time = document.getElementById('couple-in-time').value;
  const endTime = document.getElementById('couple-in-endTime').value;
  const memo = document.getElementById('couple-in-memo').value.trim();
  const statusMsg = document.getElementById('coupleStatusMsg');
  const saveBtn = document.getElementById('coupleSaveBtn');

  if(!title){ alert('제목을 입력해주세요.'); return; }
  if(!date){ alert('날짜를 선택해주세요.'); return; }
  if(endDate && endDate < date){ alert('종료일은 날짜(시작일)보다 빠를 수 없어요.'); return; }
  if(time && endTime && (!endDate || endDate === date) && endTime < time){
    alert('종료 시간은 시작 시간보다 빠를 수 없어요. (날짜가 바뀌는 일정이면 종료일도 선택해주세요)');
    return;
  }

  if(!coupleLoggedIn){ alert('로그인 후 이용해주세요.'); coupleShowLogin(); return; }

  const isEdit = !!coupleEditId;
  const item = {
    id: isEdit ? coupleEditId : uid(),
    title, date, endDate, time, endTime, memo,
    owner: coupleSelectedOwner,
    createdAt: isEdit
      ? (coupleItems.find(i => i.id === coupleEditId)?.createdAt || new Date().toISOString())
      : new Date().toISOString()
  };
  const row = coupleItemToRow(item);

  saveBtn.disabled = true;
  statusMsg.textContent = "저장 중...";
  try{
    const res = await fetch(CAL_API_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({
        action: isEdit ? "update" : "add",
        key: CAL_SITE_KEY,
        resource: "events",
        item: row
      })
    });
    const data = await res.json();
    if(!data.ok) throw new Error(data.error);
    await coupleLoad();
    statusMsg.textContent = "저장 완료 ✓";
    setTimeout(coupleCloseAdd, 500);
  }catch(err){
    statusMsg.textContent = "저장 실패: " + err.message;
  }
  saveBtn.disabled = false;
}

async function coupleDeleteEvent(id){
  if(!id) return;
  if(!coupleLoggedIn){ alert('로그인 후 이용해주세요.'); coupleShowLogin(); return; }
  if(!confirm('이 일정을 삭제할까요?')) return;
  try{
    const res = await fetch(CAL_API_URL, {
      method: "POST",
      headers: { "Content-Type": "text/plain;charset=utf-8" },
      body: JSON.stringify({ action: "delete", key: CAL_SITE_KEY, resource: "events", id })
    });
    const data = await res.json();
    if(!data.ok) throw new Error(data.error);
    await coupleLoad();
  }catch(err){
    alert("삭제 실패: " + err.message);
    return;
  }
  coupleCloseAdd();
}
</script>
</body>
