<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>체험단 당첨 관리</title>
<style>
  :root{
    --bg:#f6f5f1;
    --ink:#22221f;
    --sub:#6b6a63;
    --line:#e1dfd6;
    --card:#ffffff;
    --accent:#3a5a52;

    --wait-bg:#fdf3d9;   --wait-ink:#8a6d16;
    --conf-bg:#e2eef5;   --conf-ink:#1f5c82;
    --done-bg:#e3ede4;   --done-ink:#2f6b3c;
    --end-bg:#ececea;    --end-ink:#78766e;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Pretendard","Apple SD Gothic Neo","Malgun Gothic",system-ui,sans-serif;
    background:var(--bg);
    color:var(--ink);
    padding:32px 20px 80px;
  }
  .wrap{max-width:1180px;margin:0 auto;}

  header{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:16px;
    margin-bottom:24px;
  }
  h1{
    font-size:26px;
    letter-spacing:-0.02em;
    margin:0 0 4px;
  }
  header p{
    margin:0;
    color:var(--sub);
    font-size:13.5px;
  }

  .summary{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
    margin-bottom:22px;
  }
  .sum-card{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:10px;
    padding:14px 16px;
  }
  .sum-card .num{font-size:22px;font-weight:700;}
  .sum-card .lbl{font-size:12.5px;color:var(--sub);margin-top:2px;}
  .sum-card.wait .num{color:var(--wait-ink);}
  .sum-card.conf .num{color:var(--conf-ink);}
  .sum-card.done .num{color:var(--done-ink);}
  .sum-card.end .num{color:var(--end-ink);}

  .panel{
    background:var(--card);
    border:1px solid var(--line);
    border-radius:12px;
    padding:20px;
    margin-bottom:20px;
  }
  .panel h2{
    font-size:15px;
    margin:0 0 14px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .panel h2::before{
    content:"";
    width:6px;height:6px;border-radius:50%;
    background:var(--accent);
    display:inline-block;
  }

  .form-grid{
    display:grid;
    grid-template-columns:100px 1.3fr 1.6fr 140px 140px;
    gap:10px;
    align-items:end;
  }
  .field label{
    display:block;
    font-size:12px;
    color:var(--sub);
    margin-bottom:5px;
  }
  input,select{
    width:100%;
    padding:9px 10px;
    border:1px solid var(--line);
    border-radius:7px;
    font-size:13.5px;
    background:#fff;
    color:var(--ink);
    font-family:inherit;
  }
  input:focus,select:focus{
    outline:none;
    border-color:var(--accent);
  }
  .add-btn{
    grid-column:1/-1;
    justify-self:start;
    margin-top:4px;
    background:var(--accent);
    color:#fff;
    border:none;
    padding:10px 22px;
    border-radius:7px;
    font-size:13.5px;
    font-weight:600;
    cursor:pointer;
  }
  .add-btn:hover{opacity:0.9;}

  .toolbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    gap:12px;
    margin-bottom:12px;
  }
  .tabs{display:flex;gap:6px;flex-wrap:wrap;}
  .tab{
    border:1px solid var(--line);
    background:#fff;
    padding:7px 14px;
    border-radius:20px;
    font-size:13px;
    cursor:pointer;
    color:var(--sub);
  }
  .tab.active{
    background:var(--ink);
    color:#fff;
    border-color:var(--ink);
  }
  .io-btns{display:flex;gap:8px;}
  .io-btns button{
    border:1px solid var(--line);
    background:#fff;
    padding:7px 12px;
    border-radius:7px;
    font-size:12.5px;
    cursor:pointer;
    color:var(--sub);
  }
  .io-btns button:hover{border-color:var(--accent);color:var(--accent);}
  #importFile{display:none;}

  table{
    width:100%;
    border-collapse:collapse;
    font-size:13.5px;
  }
  thead th{
    text-align:left;
    font-size:12px;
    color:var(--sub);
    font-weight:600;
    padding:0 10px 10px;
    border-bottom:1px solid var(--line);
    white-space:nowrap;
  }
  tbody td{
    padding:12px 10px;
    border-bottom:1px solid var(--line);
    vertical-align:middle;
  }
  tbody tr:hover{background:#fafaf7;}
  .region-badge{
    font-size:11.5px;
    padding:2px 8px;
    border-radius:5px;
    background:#eef0ec;
    color:var(--sub);
    white-space:nowrap;
  }
  .name-cell{font-weight:600;}
  .deadline-cell.urgent{color:#b3452f;font-weight:600;}
  .status-select{
    font-size:12.5px;
    padding:6px 8px;
    border-radius:6px;
    border:1px solid transparent;
    font-weight:600;
    cursor:pointer;
  }
  .status-wait{background:var(--wait-bg);color:var(--wait-ink);}
  .status-confirm{background:var(--conf-bg);color:var(--conf-ink);}
  .status-done{background:var(--done-bg);color:var(--done-ink);}
  .status-end{background:var(--end-bg);color:var(--end-ink);}

  .resv-input{
    font-size:12px;
    padding:5px 6px;
    margin-top:5px;
    width:100%;
  }
  .del-btn{
    background:none;
    border:none;
    color:#b7b5ac;
    cursor:pointer;
    font-size:16px;
    line-height:1;
  }
  .del-btn:hover{color:#b3452f;}

  .empty{
    text-align:center;
    padding:50px 0;
    color:var(--sub);
    font-size:13.5px;
  }

  @media (max-width:820px){
    .form-grid{grid-template-columns:1fr 1fr;}
    .summary{grid-template-columns:repeat(2,1fr);}
    table, thead, tbody, th, td, tr{display:block;}
    thead{display:none;}
    tbody tr{
      border:1px solid var(--line);
      border-radius:10px;
      margin-bottom:10px;
      padding:10px 12px;
    }
    tbody td{border:none;padding:6px 0;}
    tbody td::before{
      content:attr(data-label);
      display:block;
      font-size:11px;
      color:var(--sub);
      margin-bottom:2px;
    }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div>
      <h1>블로그 체험단 관리</h1>
      <p>당첨된 체험단을 등록하고 예약·완료 상태를 관리하세요.</p>
    </div>
  </header>

  <div class="summary" id="summary"></div>

  <div class="panel">
    <h2>새 체험단 등록</h2>
    <div class="form-grid">
      <div class="field">
        <label>지역</label>
        <select id="in-region">
          <option value="서울">서울</option>
          <option value="경기">경기</option>
        </select>
      </div>
      <div class="field">
        <label>체험단 이름</label>
        <input id="in-name" placeholder="예: OO 맛집 체험단">
      </div>
      <div class="field">
        <label>제공내역</label>
        <input id="in-provide" placeholder="예: 식사 2인 + 원고료 5만원">
      </div>
      <div class="field">
        <label>마감일자</label>
        <input id="in-deadline" type="date">
      </div>
      <div class="field">
        <label>상태</label>
        <select id="in-status">
          <option value="wait">예약대기</option>
          <option value="confirm">예약완료</option>
          <option value="done">체험완료</option>
          <option value="end">종료</option>
        </select>
      </div>
      <button class="add-btn" onclick="addItem()">+ 추가하기</button>
    </div>
  </div>

  <div class="panel">
    <div class="toolbar">
      <div class="tabs" id="tabs"></div>
      <div class="io-btns">
        <button onclick="exportData()">내보내기(JSON)</button>
        <button onclick="document.getElementById('importFile').click()">가져오기</button>
        <input type="file" id="importFile" accept="application/json" onchange="importData(event)">
      </div>
    </div>

    <table>
      <thead>
        <tr>
          <th>지역</th>
          <th>체험단 이름</th>
          <th>제공내역</th>
          <th>마감일자</th>
          <th>상태 / 예약일시</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
    <div class="empty" id="emptyMsg" style="display:none;">등록된 체험단이 없습니다.</div>
  </div>

</div>

<script>
let items = [];
let filter = "all";

const statusMeta = {
  wait:    { label:"예약대기",  cls:"status-wait" },
  confirm: { label:"예약완료",  cls:"status-confirm" },
  done:    { label:"체험완료",  cls:"status-done" },
  end:     { label:"종료",      cls:"status-end" }
};

function uid(){ return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function addItem(){
  const region = document.getElementById('in-region').value;
  const name = document.getElementById('in-name').value.trim();
  const provide = document.getElementById('in-provide').value.trim();
  const deadline = document.getElementById('in-deadline').value;
  const status = document.getElementById('in-status').value;

  if(!name){ alert('체험단 이름을 입력해주세요.'); return; }

  items.push({
    id: uid(),
    region, name, provide, deadline, status,
    resvDate: "", resvTime: ""
  });

  document.getElementById('in-name').value = "";
  document.getElementById('in-provide').value = "";
  document.getElementById('in-deadline').value = "";
  document.getElementById('in-status').value = "wait";

  render();
}

function deleteItem(id){
  if(!confirm('이 체험단을 삭제할까요?')) return;
  items = items.filter(it => it.id !== id);
  render();
}

function updateStatus(id, value){
  const it = items.find(i => i.id === id);
  it.status = value;
  render();
}

function updateResv(id, field, value){
  const it = items.find(i => i.id === id);
  it[field] = value;
}

function setFilter(f){
  filter = f;
  render();
}

function isUrgent(deadline){
  if(!deadline) return false;
  const d = new Date(deadline);
  const today = new Date();
  today.setHours(0,0,0,0);
  const diff = (d - today) / (1000*60*60*24);
  return diff >= 0 && diff <= 3;
}

function render(){
  // summary
  const counts = { wait:0, confirm:0, done:0, end:0 };
  items.forEach(it => counts[it.status]++);
  document.getElementById('summary').innerHTML = `
    <div class="sum-card wait"><div class="num">${counts.wait}</div><div class="lbl">예약대기</div></div>
    <div class="sum-card conf"><div class="num">${counts.confirm}</div><div class="lbl">예약완료</div></div>
    <div class="sum-card done"><div class="num">${counts.done}</div><div class="lbl">체험완료</div></div>
    <div class="sum-card end"><div class="num">${counts.end}</div><div class="lbl">종료</div></div>
  `;

  // tabs
  const tabDefs = [
    {key:"all", label:`전체 (${items.length})`},
    {key:"wait", label:`예약대기 (${counts.wait})`},
    {key:"confirm", label:`예약완료 (${counts.confirm})`},
    {key:"done", label:`체험완료 (${counts.done})`},
    {key:"end", label:`종료 (${counts.end})`}
  ];
  document.getElementById('tabs').innerHTML = tabDefs.map(t =>
    `<button class="tab ${filter===t.key?'active':''}" onclick="setFilter('${t.key}')">${t.label}</button>`
  ).join('');

  // rows
  let list = filter === "all" ? items.slice() : items.filter(it => it.status === filter);
  list.sort((a,b) => (a.deadline || "9999").localeCompare(b.deadline || "9999"));

  const tbody = document.getElementById('tbody');
  const emptyMsg = document.getElementById('emptyMsg');

  if(list.length === 0){
    tbody.innerHTML = "";
    emptyMsg.style.display = "block";
    return;
  }
  emptyMsg.style.display = "none";

  tbody.innerHTML = list.map(it => {
    const urgent = it.status === "wait" && isUrgent(it.deadline);
    const resvBlock = it.status === "confirm" ? `
      <input type="date" class="resv-input" value="${it.resvDate}"
        onchange="updateResv('${it.id}','resvDate',this.value)">
      <input type="time" class="resv-input" value="${it.resvTime}"
        onchange="updateResv('${it.id}','resvTime',this.value)">
    ` : "";

    return `
      <tr>
        <td data-label="지역"><span class="region-badge">${it.region}</span></td>
        <td data-label="체험단 이름" class="name-cell">${escapeHtml(it.name)}</td>
        <td data-label="제공내역">${escapeHtml(it.provide) || '-'}</td>
        <td data-label="마감일자" class="deadline-cell ${urgent ? 'urgent':''}">${it.deadline || '-'}</td>
        <td data-label="상태">
          <select class="status-select ${statusMeta[it.status].cls}" onchange="updateStatus('${it.id}', this.value)">
            ${Object.keys(statusMeta).map(k =>
              `<option value="${k}" ${k===it.status?'selected':''}>${statusMeta[k].label}</option>`
            ).join('')}
          </select>
          ${resvBlock}
        </td>
        <td data-label=""><button class="del-btn" onclick="deleteItem('${it.id}')">✕</button></td>
      </tr>
    `;
  }).join('');
}

function escapeHtml(str){
  return (str||"").replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}

function exportData(){
  const blob = new Blob([JSON.stringify(items, null, 2)], {type:"application/json"});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `체험단관리_${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importData(e){
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = function(evt){
    try{
      const data = JSON.parse(evt.target.result);
      if(Array.isArray(data)){
        items = data;
        render();
        alert('불러오기 완료: ' + data.length + '건');
      }
    }catch(err){
      alert('파일을 읽을 수 없습니다. JSON 형식을 확인해주세요.');
    }
  };
  reader.readAsText(file);
  e.target.value = "";
}

render();
</script>
</body>
</html>
